stages:
  - build
  - test

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  ESHKOL_REQUIRED_LLVM_MAJOR: "21"

.linux-base:
  image: ubuntu:22.04
  before_script:
    - apt-get update
    - apt-get install -y wget gnupg lsb-release software-properties-common
    - wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
    - echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${ESHKOL_REQUIRED_LLVM_MAJOR} main" | tee /etc/apt/sources.list.d/llvm.list
    - apt-get update
    - apt-get install -y cmake ninja-build llvm-${ESHKOL_REQUIRED_LLVM_MAJOR} llvm-${ESHKOL_REQUIRED_LLVM_MAJOR}-dev libreadline-dev pkg-config build-essential libssl-dev libncurses-dev git python3
    - ln -sf /usr/bin/llvm-config-${ESHKOL_REQUIRED_LLVM_MAJOR} /usr/bin/llvm-config

.linux-test-base:
  image: ubuntu:22.04
  stage: test
  before_script:
    - apt-get update
    - apt-get install -y wget gnupg
    - wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
    - echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${ESHKOL_REQUIRED_LLVM_MAJOR} main" | tee /etc/apt/sources.list.d/llvm.list
    - apt-get update
    - apt-get install -y llvm-${ESHKOL_REQUIRED_LLVM_MAJOR} llvm-${ESHKOL_REQUIRED_LLVM_MAJOR}-dev clang-${ESHKOL_REQUIRED_LLVM_MAJOR} libreadline-dev build-essential libssl-dev libncurses-dev git python3
    - ln -sf /usr/bin/llvm-config-${ESHKOL_REQUIRED_LLVM_MAJOR} /usr/bin/llvm-config
    - ln -sf /usr/bin/clang-${ESHKOL_REQUIRED_LLVM_MAJOR} /usr/bin/clang
    - ln -sf /usr/bin/clang++-${ESHKOL_REQUIRED_LLVM_MAJOR} /usr/bin/clang++

.linux-matrix:
  parallel:
    matrix:
      - BUILD_TYPE: "Debug"
        BACKEND: "lite"
        BUILD_DIR: "build-lite-debug"
        XLA_ENABLED: "OFF"
        GPU_ENABLED: "OFF"
      - BUILD_TYPE: "Release"
        BACKEND: "lite"
        BUILD_DIR: "build-lite-release"
        XLA_ENABLED: "OFF"
        GPU_ENABLED: "OFF"
      - BUILD_TYPE: "Debug"
        BACKEND: "xla"
        BUILD_DIR: "build-xla-debug"
        XLA_ENABLED: "ON"
        GPU_ENABLED: "OFF"
      - BUILD_TYPE: "Release"
        BACKEND: "xla"
        BUILD_DIR: "build-xla-release"
        XLA_ENABLED: "ON"
        GPU_ENABLED: "OFF"
      - BUILD_TYPE: "Debug"
        BACKEND: "cuda"
        BUILD_DIR: "build-cuda-debug"
        XLA_ENABLED: "OFF"
        GPU_ENABLED: "ON"
      - BUILD_TYPE: "Release"
        BACKEND: "cuda"
        BUILD_DIR: "build-cuda-release"
        XLA_ENABLED: "OFF"
        GPU_ENABLED: "ON"

build-linux:
  extends:
    - .linux-base
    - .linux-matrix
  stage: build
  script:
    - cmake -S . -B "${BUILD_DIR}" -G Ninja -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" -DESHKOL_REQUIRED_LLVM_MAJOR="${ESHKOL_REQUIRED_LLVM_MAJOR}" -DLLVM_CONFIG_EXECUTABLE=/usr/bin/llvm-config-${ESHKOL_REQUIRED_LLVM_MAJOR} -DESHKOL_XLA_ENABLED="${XLA_ENABLED}" -DESHKOL_GPU_ENABLED="${GPU_ENABLED}"
    - cmake --build "${BUILD_DIR}" --parallel
  artifacts:
    paths:
      - ${BUILD_DIR}/
    expire_in: 1 week

test-linux:
  extends:
    - .linux-test-base
    - .linux-matrix
  script:
    - |
      case "${BACKEND}" in
        lite)
          ln -sfn "${BUILD_DIR}" build
          ./scripts/run_all_tests.sh
          ;;
        xla)
          BUILD_DIR="${BUILD_DIR}" ./scripts/run_xla_tests.sh
          ;;
        cuda)
          BUILD_DIR="${BUILD_DIR}" ./scripts/run_gpu_tests.sh
          ;;
        *)
          echo "Unknown backend: ${BACKEND}"
          exit 1
          ;;
      esac
