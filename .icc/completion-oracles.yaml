        label: Full per-step state agrees for all 71 programs (extended check)
        action: ./scripts/run_sdnc_oracle.sh

      - runtime_event:
          event_kinds: [eshkol_vm_halt]
        severity: high
        label: At least one bytecode VM trace records a program halt
        action: ./scripts/run_sdnc_oracle.sh

  # ─────────────────────────────────────────────────────────────────
  # No-regression gate — used after a refactor or codegen change to
  # confirm the fix didn't break anything. Lower bar than full release.
  # ─────────────────────────────────────────────────────────────────
  - name: no-regression
    aliases: [smoke, sanity, safe-to-merge]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["v1_2_edge_case_tests_pass"]
          event_values: ["PASS"]
        severity: high
        label: All tests under tests/v1_2_edge_cases/ pass
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["stdlib_compiles_clean"]
          event_values: ["PASS"]
        severity: high
        label: build/stdlib.o builds without warnings
        action: touch lib/stdlib.esk && cmake --build build --target stdlib

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["example_agent_compiles"]
          event_values: ["PASS"]
        severity: medium
        label: examples/agent.esk compiles end-to-end
        action: ./build/eshkol-run examples/agent.esk -o /tmp/selene

  # ─────────────────────────────────────────────────────────────────
  # Stress-budget gate (adversarial campaign pillar P4) — every program
  # in tests/stress/budgets.tsv runs under JIT (-r) and AOT with
  # wall-time + max-RSS ceilings asserted by scripts/run_stress.sh,
  # which writes kind:"stress_smoke" events to
  # scripts/icc_traces/stress_smoke.jsonl. Probe ids are
  # stress_<file>_<mode>; stress_suite_green is the whole-sweep verdict
  # (any FAIL/CRASH/HANG/OVER-RSS or stale-XKNOWN XPASS flips it).
  # Documented-open bugs (budgets.tsv xknown column -> ESH ledger ids)
  # are XKNOWN and do not gate. Representative per-probe criteria below
  # pin the highest-value regression classes directly.
  # ─────────────────────────────────────────────────────────────────
  - name: stress-budget
    aliases: [stress, p4, stress-harness]
    requires:
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_suite_green"]
          event_values: ["PASS"]
        severity: high
        label: Full stress sweep green (all budgets met, no stale XKNOWN)
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_rec_tco_1e8_r"]
          event_values: ["PASS"]
        severity: high
        label: 10^8-iteration tail call runs in O(1) stack under r
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_rec_tco_1e8_aot"]
          event_values: ["PASS"]
        severity: high
        label: 10^8-iteration tail call runs in O(1) stack under aot
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_endur_with_region_100k_r"]
          event_values: ["PASS"]
        severity: high
        label: 100k with-region allocations stay under the RSS ceiling (PR #81 class) under r
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_endur_with_region_100k_aot"]
          event_values: ["PASS"]
        severity: high
        label: 100k with-region allocations stay under the RSS ceiling (PR #81 class) under aot
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_endur_ad_gradient_100k_r"]
          event_values: ["PASS"]
        severity: high
        label: 100k-iteration gradient loop RSS plateaus under r
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_num_bignum_expt_1e1000_r"]
          event_values: ["PASS"]
        severity: medium
        label: 10^1000 bignum expt + string round-trip under r
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_par_spawn_join_100x_r"]
          event_values: ["PASS"]
        severity: medium
        label: 100x parallel spawn/join deterministic across 3 repetitions under r
        action: ./scripts/run_stress.sh
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_jit_cache_probe_r"]
          event_values: ["PASS"]
        severity: medium
        label: 50 sequential -r invocations stay under the warm-path ceiling
        action: ./scripts/run_stress.sh

