  # ─────────────────────────────────────────────────────────────────
  # AD composition oracle (adversarial testing campaign P3). The full
  # AD operator surface ({derivative gradient jacobian hessian divergence
  # curl laplacian} x point types x function shapes x bindings x captures
  # x nesting) is enumerated by tests/ad_oracle/gen_ad_oracle.py and every
  # cell is checked against an in-language central finite difference under
  # BOTH the JIT (-r) and AOT by scripts/run_ad_oracle.sh, which writes
  # kind:"ad_oracle" events to scripts/icc_traces/ad_oracle.jsonl.
  # The gate event is PASS when no probe file FAILs/CRASHes/HANGs on
  # either path (XKNOWN cells reference open ESH tasks and are tolerated).
  # ─────────────────────────────────────────────────────────────────
  - name: ad-oracle
    aliases: [ad_oracle, ad-composition-oracle, adversarial-p3]
    requires:
      - runtime_event:
          event_kinds: [ad_oracle]
          event_names: ["ad_oracle_gate"]
          event_values: ["PASS"]
        severity: high
        label: AD composition oracle gate (all cells match finite differences on -r and AOT)
        action: ./scripts/run_ad_oracle.sh
  # Differential execution cleanliness — adversarial campaign pillar P1
  # (.swarm/ADVERSARIAL_TESTING_CAMPAIGN.md). Every deterministic program
  # must produce identical (exit code, normalized stdout) on every
  # execution axis: jit, jit-nocache (ESHKOL_JIT_CACHE=0), aot -O0 and
  # aot -O2. Any divergence is a compiler bug by definition.
  #
  # scripts/run_differential.sh runs tests/differential/corpus/ and writes
  # kind:"differential_smoke" events to
  # scripts/icc_traces/differential_smoke.jsonl; the aggregate event
  # differential_corpus_clean is PASS only when zero axis pairs diverge.
  # scripts/run_differential_fuzz.sh --seed 42 --count 200 does the same
  # for generated programs (differential_fuzz_clean in
  # scripts/icc_traces/differential_fuzz.jsonl), auto-shrinking any
  # divergent program into tests/differential/found/NNN_shrunk.esk.
  #
  # This oracle SHOULD be red while known divergences exist in the corpus
  # — the findings in tests/differential/found/ are the open bugs.
  # ─────────────────────────────────────────────────────────────────
  - name: differential-clean
    aliases: [differential, p1-differential, differential-smoke]
    requires:
      - runtime_event:
          event_kinds: [differential_smoke]
          event_names: ["differential_corpus_clean"]
          event_values: ["PASS"]
        severity: high
        label: Every corpus program agrees on every native axis pair (jit / jit-nocache / aot-o0 / aot-o2)
        action: ./scripts/run_differential.sh
      - runtime_event:
          event_kinds: [differential_smoke]
          event_names: ["differential_fuzz_clean"]
          event_values: ["PASS"]
        severity: high
        label: Seeded 200-program fuzz run finds no cross-axis divergence
        action: ./scripts/run_differential_fuzz.sh --seed 42 --count 200
  # Adversarial pillar P2 — feature-pair composition matrix
  # (.swarm/ADVERSARIAL_TESTING_CAMPAIGN.md). scripts/run_edge_matrix.sh
  # runs the generated corpus in tests/edge_matrix/generated/ under both
  # JIT -r and AOT, classifies each probe file, and emits edge_matrix
  # trace events. The sweep-level event is PASS iff every file×mode not
  # allowlisted in tests/edge_matrix/KNOWN_FAILURES.txt passed.
  # ─────────────────────────────────────────────────────────────────
  - name: edge-matrix
    aliases: [edge-matrix-sweep, p2-composition-matrix]
    requires:
      - runtime_event:
          event_kinds: [edge_matrix]
          event_names: ["edge_matrix_sweep_clean"]
          event_values: ["PASS"]
        severity: high
        label: Feature-pair composition sweep clean (no unexpected non-PASS)
        action: python3 tests/edge_matrix/gen_matrix.py && ./scripts/run_edge_matrix.sh
