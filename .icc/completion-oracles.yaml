  # ─────────────────────────────────────────────────────────────────
  # SDNC paper reproducibility — the headline claim from
  #   "The Self-Differentiating Neural Computer: Computable Transformers
  #    via Analytical Weight Construction" (tsotchke 2026).
  # The reference C bytecode VM and the analytically-constructed
  # transformer must agree bit-identically on outputs (paper §4.4) and
  # ideally on the full per-step state. scripts/run_sdnc_oracle.sh runs
  # the paper suite and writes summary events; per-program disagreement
  # also surfaces as sdnc_program FAIL records.
  # ─────────────────────────────────────────────────────────────────
  - name: sdnc-paper-reproducibility
    aliases: [sdnc, sdnc-paper, computable-transformers]
    requires:
      - runtime_event:
          event_kinds: [sdnc_paper_suite]
          event_names: ["output_agreement"]
          event_values: ["PASS"]
        severity: high
        label: All 71 programs produce bit-identical PRINT outputs (paper §4.4)
        action: ./scripts/run_sdnc_oracle.sh

      - runtime_event:
          event_kinds: [sdnc_paper_suite]
          event_names: ["trace_agreement"]
          event_values: ["PASS"]
        severity: medium
        label: Full per-step state agrees for all 71 programs (extended check)
        action: ./scripts/run_sdnc_oracle.sh

      - runtime_event:
          event_kinds: [eshkol_vm_halt]
        severity: high
        label: At least one bytecode VM trace records a program halt
        action: ./scripts/run_sdnc_oracle.sh

      # Weight-matrix backward gradient check (docs/SDNC.md §13). The
      # reverse-mode FFN backward passes in lib/backend/qllm_backward.c
      # must match a central finite-difference reference to L2 relative
      # error < 1e-6. Emitted by the qllm_backward_gradcheck probe in
      # scripts/run_icc_smoke.sh (double-precision build of the
      # precision-generic backward source).
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["qllm_backward_gradcheck"]
          event_values: ["PASS"]
        severity: high
        label: SDNC weight-matrix FFN backward gradients match finite differences (< 1e-6)
        action: ./scripts/run_icc_smoke.sh

  # ─────────────────────────────────────────────────────────────────
  # No-regression gate — used after a refactor or codegen change to
  # confirm the fix didn't break anything. Lower bar than full release.
  # ─────────────────────────────────────────────────────────────────
  - name: no-regression
    aliases: [smoke, sanity, safe-to-merge]
