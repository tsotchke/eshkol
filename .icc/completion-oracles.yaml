  # bakes Python arbitrary-precision int / fractions.Fraction ground
  # truth (or analytic identities) into per-family Eshkol self-checks
  # swept over a scale/depth parameter n=1..N; scripts/run_numeric_depth.sh
  # runs each family under both -r (jit) and AOT, records max-correct-n,
  # and diffs the wrong-n set / DONE markers against
  # tests/numeric_depth/BASELINE.json. A NEW silent-wrong n, a regressed
  # max-correct-n, or a lost DONE marker fails the sweep. Documented bug
  # boundaries (ESH-0105/0110 rational contagion, ESH-0124 gcd bignum,
  # ESH-0125 bignum divmod) live in the baseline. Writes kind:"numeric_depth"
  # events to scripts/icc_traces/numeric_depth.jsonl.
