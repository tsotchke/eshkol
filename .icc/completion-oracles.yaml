  # ─────────────────────────────────────────────────────────────────
  # Depth-coverage completeness (Pillar P6 auditor). The meta-check that
  # PROVES the depth-parametric sweeps cover the depth of the ENTIRE
  # language, not just AD. scripts/check_depth_coverage.py re-derives the
  # construct surface from the AST op enum (inc/eshkol/eshkol.h) and
  # asserts, against scripts/depth_coverage_registry.json, that every op
  # is classified composable/leaf and every composable construct has a
  # registered depth sweep (an owning P6a..P6f pillar) or a tracked gap
  # (ESH-#### task). A new nestable construct added without a sweep or a
  # filed gap FAILS the gate — so the ESH-0117 blind spot (a construct
  # silently tested only at shallow depth) cannot recur. Human-readable
  # matrix: docs/DEPTH_COVERAGE_MATRIX.md. Writes kind:"depth_coverage"
  # events to scripts/icc_traces/depth_coverage.jsonl.
  # ─────────────────────────────────────────────────────────────────
  - name: depth-coverage
    aliases: [depth_coverage, depth-parametric-coverage, p6-auditor]
    requires:
      - runtime_event:
          event_kinds: [depth_coverage]
          event_names: ["depth_coverage_gate"]
          event_values: ["PASS"]
        severity: high
        label: Every composable construct has a registered depth sweep or a tracked gap
        action: python3 scripts/check_depth_coverage.py
  # Depth-parametric recursion/control sweep — adversarial campaign
  # pillar P6b (.swarm/DEPTH_PARAMETRIC_TESTING.md). For EACH recursion/
  # control KIND (self-tail, mutual-tail 2/3-cycle, non-tail, CPS,
  # recursion-through-map, metacircular-eval, dynamic-wind, call/cc,
  # guard, stdlib length) a ladder of self-checking probes is swept to
  # find and gate the maximum safe depth under BOTH -r and AOT. Each
  # probe computes a closed-form value (triangular sum / list length) so
  # a WRONG value is detectable, not just a crash.
  #
  # scripts/gen_recursion_depth.py generates tests/recursion_depth/
  # generated/; scripts/run_recursion_depth.sh runs the sweep and writes
  # kind:"recursion_depth" events to
  # scripts/icc_traces/recursion_depth.jsonl. The gate is PASS when NO
  # probe is a SILENT crash (fatal signal with no diagnostic) or a WRONG
  # value on a pass|limit cell. Clean depth limits (diagnostic + nonzero
  # exit) and tracked XKNOWN silent crashes (ESH-0102 mutual-tail,
  # ESH-0108 stdlib length, ESH-0112 non-tail, ESH-0119 SIGILL-not-caught
  # guard/metacircular/dynamic-wind) are tolerated.
  # ─────────────────────────────────────────────────────────────────
  - name: recursion-depth
    aliases: [recursion_depth, recursion-depth-sweep, adversarial-p6b]
    requires:
      - runtime_event:
          event_kinds: [recursion_depth]
          event_names: ["recursion_depth_gate"]
          event_values: ["PASS"]
        severity: high
        label: Recursion/control depth sweep gate (no silent crash, no wrong value at any tested depth; -r and AOT)
        action: ./scripts/run_recursion_depth.sh
  # Numeric-tower depth/scale-parametric sweep (adversarial pillar P6d,
