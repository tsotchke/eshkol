  # ─────────────────────────────────────────────────────────────────
  # Stress-budget gate (adversarial campaign pillar P4) — every program
  # in tests/stress/budgets.tsv runs under JIT (-r) and AOT with
  # wall-time + max-RSS ceilings asserted by scripts/run_stress.sh,
  # which writes kind:"stress_smoke" events to
  # scripts/icc_traces/stress_smoke.jsonl. Probe ids are
  # stress_<file>_<mode>; stress_suite_green is the whole-sweep verdict
  # (any FAIL/CRASH/HANG/OVER-RSS or stale-XKNOWN XPASS flips it).
  # Documented-open bugs (budgets.tsv xknown column -> ESH ledger ids)
  # are XKNOWN and do not gate. Representative per-probe criteria below
  # pin the highest-value regression classes directly.
  # ─────────────────────────────────────────────────────────────────
  - name: stress-budget
    aliases: [stress, p4, stress-harness]
    requires:
      - runtime_event:
          event_kinds: [stress_smoke]
          event_names: ["stress_suite_green"]
          event_values: ["PASS"]
        severity: high
