        severity: high
        label: 'Syntax/data nesting-depth sweep: no silent wrong value, no -r/AOT-O0/AOT-O2 divergence at any nested depth'
        action: ./scripts/run_nesting_depth.sh
      - runtime_event:
          event_kinds: [metamorphic]
          event_names: ["metamorphic_gate"]
          event_values: ["PASS"]
        severity: high
        label: 'Deterministic metamorphic law corpus passes with only tracked XKNOWN violations'
        action: ./scripts/run_metamorphic.sh
      - runtime_event:
          event_kinds: [sanitizer_fuzz]
          event_names: ["sanitizer_fuzz_clean"]
          event_values: ["PASS"]
        severity: high
        label: 'Full ASan+UBSan fuzz/tests corpus has zero sanitizer signatures'
        action: ./scripts/run_sanitizer_fuzz.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["edge_v134_dynamic_coverage"]
          event_values: ["PASS"]
        severity: high
        label: 'v1.3.4 dynamic edge coverage: the seeded, bounded, depth-parametric generator (scripts/gen_edge_v134.py) exercises every new-surface family — nursery iter-scope (6 barrier channels), capturing parallel-map/parallel-execute, exact gradient-through-callable + curried, native i128 wraparound (differential native-vs-VM), native matmul, and VM ad-pow/ad-tape — green across JIT/AOT-O0/AOT-O2/VM with no native-vs-VM divergence (full per-family gates in the v1.3.4-edge-coverage oracle)'
        action: ./scripts/run_icc_smoke.sh

      - test_evidence: true
        severity: high
        label: 'v1.3 edge-case tests are indexed and runnable'
        action: cd build && cmake --build . && ctest -R v1_3

      - no_contract_gap:
          - missing_expected_contract_kind
