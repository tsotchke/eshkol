        label: SICP ch1_higher_order passes under r
        action: ./scripts/run_sicp_smoke.sh
      - runtime_event:
          event_kinds: [sicp_smoke]
          event_names: ["sicp_ch1_higher_order_aot"]
          event_values: ["PASS"]
