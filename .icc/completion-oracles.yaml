# ICC completion oracles for the Eshkol compiler.
#
# Each oracle is a target name plus a list of `requires` criteria. ICC's
# `completion-oracle` subcommand checks that each criterion has evidence
# (test indexed, contract present, runtime check passed, no stub paths)
# and produces a verdict the assistant can plan against.
#
# Targets here mirror the milestone structure in ROADMAP.md / ESHKOL_VERSION.txt
# and the agent-blocker matrix in plans/note-for-eshkol-agent.md.

oracles:
  # ─────────────────────────────────────────────────────────────────
  # Main compiler readiness — the everyday "is the compiler healthy"
  # check. Used by `icc next-action --target eshkol-compiler` to surface
  # what's blocking work today.
  #
  # Each runtime_event criterion looks for a JSON-L line in
  # scripts/icc_traces/*.jsonl with kind:"eshkol_smoke" name:<id>
  # value:"PASS". scripts/run_icc_smoke.sh produces the trace; running
  # it before `icc completion-oracle` flips this oracle to green.
  # ─────────────────────────────────────────────────────────────────
  - name: eshkol-compiler-readiness
    aliases: [eshkol, compiler, eshkol-compiler]
    requires:
      - test_evidence: true
        severity: high
        label: v1.2 edge-case tests are indexed and runnable
        action: cd build && cmake --build . && ctest -R v1_2

      - no_contract_gap:
          - flag_without_contract
          - state_key_produced_without_consumer
          - state_key_consumed_without_producer
          - artifact_without_test_or_trace
          - missing_expected_contract_kind
        severity: high
        label: Compiler subsystems wire together without dangling contracts
        action: fix_contract_graph_gap

      - no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
        # Runtime exercise is enforced separately by the exact runtime_event
        # criteria below and by INV-language-surface-exercise.  Do not fold
        # `not_exercised_by_real_smoke` into stub classification: that tag is a
        # symbol-name correlation heuristic and marks real compiled functions
        # whenever a trace proves behavior without spelling the C/C++ symbol.
        # Keeping it here would turn stronger, broader traces into thousands of
        # false "stub" blockers despite 100% language-surface execution.
        # This target certifies compiler/runtime/type-checker production code.
        # The public website is a separately deployed WASM application with its
        # own build/runtime gate; backend-related prose in its downloads page
        # must not be mistaken for a compiler fallback by the lexical audit.
        exclude_path_prefixes: [site/]
        severity: high
        label: Codegen / runtime / type-checker production paths are real
        action: wire_real_path_or_classify_stub

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["llvm_module_verifier_clean"]
          event_values: ["PASS"]
        severity: high
        label: LLVM verifyModule passes on the codegen output
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["aot_link_succeeds"]
          event_values: ["PASS"]
        severity: high
        label: eshkol-run produces a runnable binary from an .esk file
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["transitive_load_agent_ffi_link"]
          event_values: ["PASS"]
        severity: high
        label: 'Driver: agent-FFI native-link requirements propagate through the full transitive source closure (load/import/require, any depth; JIT+AOT), a plain program does not over-link the archive, and a broken generated-program link under -r exits nonzero instead of masking it with a reduced in-process fallback'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["jit_repl_clean_exit"]
          event_values: ["PASS"]
        severity: medium
        label: eshkol-repl + eshkol-run -r return cleanly on a smoke input
        action: ./scripts/run_icc_smoke.sh

      # -- Full-claim adversarial gates (2026-07-10 oracle hardening). --
      # These assert the COMPLETE feature claims that an audit found the
      # oracle was silently over-promising. The narrow ad_input2_* probes
      # in v1.3-evolve only ever exercised the one working calling pattern
      # (literal-lambda loss + scalar gamma); this criterion is the one
      # that certifies input2 gradients actually work end-to-end.
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["tensor_input2_grad_exact_firstclass_and_vector"]
          event_values: ["PASS"]
        severity: high
        label: 'ESH-0212/#229: input2 tensor gradients (matmul B, conv2d kernel, attention K/V, per-feature batch/layer-norm gamma) match central finite-difference EXACTLY across literal, first-class AND higher-order loss forms and vector gamma (JIT+AOT, 24/24) — not just the literal-scalar path'
        action: ./scripts/run_icc_smoke.sh

      # Region escape-evacuator subtype coverage, run under
      # ESHKOL_ARENA_POISON=1 so a missed interior pointer crashes at a
      # 0xCB.. address rather than reading stale data. Closes the blind
      # spot where the PROMISE-corruption evacuation gap was invisible to
      # readiness=100 because no oracle criterion referenced this gate.
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["region_evac_subtype_coverage"]
          event_values: ["PASS"]
        severity: high
        label: 'ESH-0214d/e: region escape-evacuator keeps promoted logic/workspace/PROMISE subtype interiors intact under ESHKOL_ARENA_POISON=1 (AOT, flat RSS)'
        action: ./scripts/run_icc_smoke.sh

      # Generative adversarial AD-vs-finite-difference oracle. Where the
      # tensor_input2 gate above pins a FIXED set of second-operand losses,
      # this criterion certifies that a GENERATED family of differentiable
      # programs — random scalar/field expression trees plus tensor/ML-op
      # loss compositions (matmul/conv2d/attention/batch+layer-norm/softmax),
      # differentiated to gradient, laplacian AND hessian, at scalar, vector
      # and tensor-literal points, across literal/first-class/wrapper loss
      # forms — matches a central finite difference. It is the continuous
      # silent-wrong-gradient tripwire: a NEW zero-where-FD-is-nonzero (the
      # worst AD defect class) turns readiness red instead of shipping wrong
      # training gradients. The smoke probe runs the --quick subset (one file
      # per family); the full JIT+AOT sweep is scripts/run_ad_adversarial.sh.
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_adversarial_fd_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'Generative adversarial AD oracle: a seeded, growing family of random differentiable programs (scalar + field + tensor/ML-op compositions; gradient/laplacian/hessian; scalar/vector/tensor-literal points; literal/first-class/wrapper loss forms) matches central finite differences — continuous silent-wrong-gradient tripwire, no zero-gradient-where-FD-is-nonzero'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [runtime_event]
          event_names: ["language_surface_coverage"]
          event_values: ["PASS"]
        severity: high
        label: 'TOTAL-LANGUAGE exposure coverage meets the committed monotonic floor; new language surface or generator regressions cannot silently reduce coverage'
        action: ./scripts/run_language_coverage.sh

      # Fix-campaign regression gates (2026-07-10): each guards a fixed
      # silent-wrong-answer or scale bug so it cannot silently reopen.
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["numeric_exactness_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'Numeric exactness: gcd has a bignum path, bignum quotient/remainder satisfy a=q*b+r, and eqv?/equal? are value-correct on rationals/complex (ESH-0124/0125/0114)'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["i128_native_type_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'Native 128-bit integer: distinct wrapping fixed-width type off the tower — two''s-complement wrap at +-2^127, full-range string round-trip including -2^127, shifts (0/64/127, out-of-range raises), compares, truncated quotient/remainder, i128->int range check'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["closure_set_tco_loop_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'Closure mutation: a closure made in a named-let/TCO loop that set!s a captured global keeps the mutation, not a snapshot (ESH-0094)'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["stdlib_sort_filter_scale_oracle"]
          event_values: ["PASS"]
        severity: medium
        label: 'Stdlib scale: sort (2M) and filter (1M) are tail-recursive and match a reference sort/filter (ESH-0098/0108)'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_forward_over_reverse_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'AD nesting: jacobian/hessian differentiating through an inner forward-mode derivative is exact, not silent-zero (ESH-0120/0121)'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["linear_solve_full_f64_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'linear-solve: mixed-precision iterative-refinement dense solver reaches full-f64 backward residual (<=1e-12, computed independently) on well-conditioned/identity systems and raises catchably on singular/dimension-mismatch — verified on JIT, AOT, and the VM'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["matmul_tensor_read_scope_oracle"]
          event_values: ["PASS"]
        severity: high
        label: 'matmul-tensor scope (#309): a matmul result read via tensor-ref/tensor-data from inside a defined function (captured global, argument, in-function matmul, nested define, closure, with-region escape, large GPU/BLAS-dispatched matmul) returns the same data as a top-level read — never silent zeros; verified on JIT and AOT'
        action: ./scripts/run_icc_smoke.sh
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["vm_gradient_parity"]
          event_values: ["PASS"]
        severity: high
        label: 'self-differentiating on every substrate: `gradient` on the bytecode VM (arity-resolved forward-mode dual — direct/wrapped/curried, N-arg spread, arity-1 whole-vector, non-polynomial) is 25/25 on the VM and byte-identical to native across native/vm-src/vm-eskb; the public low-level reverse-mode AD tape surface (incl. ad-pow) is green on JIT, AOT and the VM'
        action: ./scripts/run_icc_smoke.sh

  # ─────────────────────────────────────────────────────────────────
  # TOTAL-LANGUAGE completion — unlike the compiler-readiness ratchet above,
  # this target stays red until every high-risk category is exercised. It is
  # the phase-4 definition of done for the manifest-driven phase-3 campaign.
  # ─────────────────────────────────────────────────────────────────
  - name: total-language-coverage
    aliases: [language-coverage, total-language, exposure-engine-coverage]
    requires:
      - runtime_event:
          event_kinds: [runtime_event]
          event_names: ["language_surface_coverage"]
          event_values: ["PASS"]
        severity: high
        label: Exposure-engine coverage meets the committed monotonic floor
        action: ./scripts/run_language_coverage.sh

      - runtime_event:
          event_kinds: [runtime_event]
          event_names: ["language_surface_high_risk_complete"]
          event_values: ["PASS"]
        severity: high
        label: No numeric, tensor/AD, geometry, control-flow, consciousness, macro, or memory-region construct remains unexercised
        action: ./scripts/run_language_coverage.sh --require-zero-high-risk

      - test_evidence: true
        severity: medium
        label: Language-surface manifest, policy, and exposure-engine tests are indexed
        action: python3 scripts/gen_language_surface.py --check

  # ─────────────────────────────────────────────────────────────────
  # Agent-FFI readiness — the contract the eshkol-agent depends on.
  # When this oracle goes green, the agent's three blockers (HTTP,
  # subprocess, session persistence) are all cleared on the eshkol side.
  # See plans/note-for-eshkol-agent.md for the originating ranked list.
  # ─────────────────────────────────────────────────────────────────
  - name: agent-ffi-ready
    aliases: [agent-ffi, eshkol-agent-runtime]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["native_http_get_works"]
          event_values: ["PASS"]
        severity: high
        label: qllm_http_get returns a real response body for live HTTPS
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["native_http_post_json_works"]
          event_values: ["PASS"]
        severity: high
        label: qllm_http_post_json round-trips JSON to a real endpoint
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["subprocess_argv_safe"]
          event_values: ["PASS"]
        severity: high
        label: process-spawn-argv runs argv directly without shell interpretation
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["subprocess_pid_exposed"]
          event_values: ["PASS"]
        severity: medium
        label: process-pid returns the real OS PID of the spawned child
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["sqlite_text_round_trip"]
          event_values: ["PASS"]
        severity: high
        label: sqlite-column-text round-trips ≥ 30 KB session JSON without truncation
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["aot_binaries_link_agent_ffi"]
          event_values: ["PASS"]
        severity: high
        label: eshkol-run -o produces binaries that link agent FFI when (require agent.…) appears
        action: ./scripts/run_icc_smoke.sh

      - test_evidence: true
        severity: medium
        label: Agent FFI smoke tests indexed (http_server_smoke_test, etc.)
        action: ensure_tests_under_v1_2_edge_cases

  # ─────────────────────────────────────────────────────────────────
  # Stdlib readiness — every stdlib module under lib/core has a
  # provide form, a callable through stdlib.o, and at least one test.
  # Catches the common "added a function, forgot the type-checker
  # entry / known builtins list" regression class.
  # ─────────────────────────────────────────────────────────────────
  - name: stdlib-ready
    aliases: [stdlib, core-stdlib]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["stdlib_o_loads"]
          event_values: ["PASS"]
        severity: high
        label: build/stdlib.o exists and loads at JIT and AOT link time
        action: cmake --build build --target stdlib

      - test_evidence: true
        severity: medium
        label: Each stdlib module has a regression test
        action: add_test_per_stdlib_module

      - no_stubbed_paths:
          - production_fallback
          - external_backend_required
        severity: medium
        label: Stdlib functions don't shell-out for things they should compute
        action: replace_shell_fallback_with_native_path

  # ─────────────────────────────────────────────────────────────────
  # v1.2 release readiness — the gate that flips green when v1.2 ships.
  # Tracks the 7 roadmap items + the agent-blocker matrix.
  # ─────────────────────────────────────────────────────────────────
  - name: v1.2-release
    aliases: [v1.2, release-1.2, scale]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["model_serialization_round_trip"]
          event_values: ["PASS"]
        severity: high
        label: model-save / model-load preserve weights bit-exact
        action: verify_with_tensor_io_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["image_io_works"]
          event_values: ["PASS"]
        severity: medium
        label: image-read returns a tensor of the correct shape
        action: run_image_io_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["per_thread_arena_works"]
          event_values: ["PASS"]
        severity: high
        label: parallel-map can allocate per-thread without cross-thread aliasing
        action: run_parallel_arena_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["parallel_map_scope_reclaim_race"]
          event_values: ["PASS"]
        severity: high
        label: parallel-map closures using scope-based reclamation (internal loops / memv) never race the shared arena scope stack
        action: run_parallel_map_scope_reclaim_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["error_messages_have_source_locations"]
          event_values: ["PASS"]
        severity: medium
        label: Compile errors include file:line:col + caret
        action: keep_eshkol_error_at_pipeline

      - test_evidence: true
        severity: high
        label: Full 16-lane CI matrix indexed and green
        action: gh_workflow_view_main_after_push

      - no_contract_gap:
          - missing_expected_contract_kind
          - flag_without_contract
        severity: high
        label: All v1.2 features have wired contracts (plan ↔ test ↔ runtime)
        action: regenerate_contract_graph

      - no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: No silent fallbacks in v1.2 production paths
        action: classify_or_replace_each_stub

  # ─────────────────────────────────────────────────────────────────
  # v1.3-evolve readiness — tracks the v1.3 roadmap items in
  # ROADMAP.md.  Mirrors the v1.2 oracle's shape: each line item that
  # has a source-tree contract gets a runtime_event probe via
  # scripts/run_icc_smoke.sh.  Shipped items must emit PASS; planned
  # items may remain as explicit FAIL probes until their implementation
  # lands.
  #
  # The three "[x]" items already in v1.3-evolve (string interpolation,
  # named keyword arguments, let-match) get smoke probes that pin
  # their behavior so a regression downstream surfaces immediately.
  # ─────────────────────────────────────────────────────────────────
  - name: v1.3-evolve
    aliases: [v1.3, release-1.3, evolve]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["string_interpolation_works"]
          event_values: ["PASS"]
        severity: high
        label: '"…~{expr}…" parses and evaluates the embedded expression'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["keyword_args_work"]
          event_values: ["PASS"]
        severity: high
        label: '(f #:k v) bind by name and reorder freely'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["let_match_destructures"]
          event_values: ["PASS"]
        severity: high
        label: '(let-match (((list a b) (list 1 2))) …) destructures and binds'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["define_loop_flat_rss_aot"]
          event_values: ["PASS"]
        severity: high
        label: 'ESH-0214b v1.3.1: AOT guard-wrapped define loop stays under the 200MB flat-RSS ceiling'
        action: ./scripts/run_icc_smoke.sh

      # ESH-0214e: closes the ESH-0214 series. ESH-0214b's automatic
      # per-iteration reclamation was all-or-nothing — it rejected any loop body
      # that mutated persistent state, so a resident tick loop that mutates every
      # tick got NO reclamation and leaked one tick's transient garbage forever.
      # ESH-0214e lowers a mutating-but-escape-safe loop with a per-loop nursery
      # region that reuses the 48h-validated with-region deep-promotion path: the
      # write barrier promotes each persistent-mutation escapee out of the
      # nursery, the loop-carried out-values are promoted at each back edge, then
      # the nursery is reset. The gate compiles the tick loop AOT (flat RSS +
      # correct read-back of KB/workspace/list), re-runs it under
      # ESHKOL_ARENA_POISON=1 (a missed escapee crashes at 0xCB.. instead of
      # reading recycled memory), checks the JIT path, and A/Bs against the
      # explicit with-region twin.
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["iter_scope_partial_reclaim"]
          event_values: ["PASS"]
        severity: high
        label: 'ESH-0214e: resident tick loop that mutates persistent state every tick (hash-table-set!/vector-set!/set-cdr!) reclaims transient garbage automatically via a nursery region — AOT flat RSS, correct read-back, clean under ESHKOL_ARENA_POISON=1, within 10x of the with-region baseline'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["reader_fuzz_smoke"]
          event_values: ["PASS"]
        severity: high
        label: 'v1.3.1 iterative reader (runtime_reader_hosted.cpp): seeded adversarial fuzz harness finds no crash/hang, depth guard degrades gracefully'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["define_library_import_works"]
          event_values: ["PASS"]
        severity: high
        label: '(define-library …) + (import …) round-trip works in a single file'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["matmul_kernel_grad_nonzero"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through tensor-matmul to the kernel (input2) side'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_conv2d_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through conv2d to the kernel operand (literal-form scalar path only; full first-class + vector coverage is tensor_input2_grad_exact_firstclass_and_vector)'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_batchnorm_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through batch-norm to the gamma operand (literal-form scalar path only; full first-class + vector coverage is tensor_input2_grad_exact_firstclass_and_vector)'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_layernorm_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through layer-norm to the gamma operand (literal-form scalar path only; full first-class + vector coverage is tensor_input2_grad_exact_firstclass_and_vector)'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_attention_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through scaled-dot-attention to K/V operands (literal-form scalar path only; full first-class + vector coverage is tensor_input2_grad_exact_firstclass_and_vector)'
        action: ./scripts/run_icc_smoke.sh

      # -- arbitrary-order AD Taylor-tower v1.3 track --
      - runtime_event:
          event_kinds: [ad_depth]
          event_names: ["ad_taylor_p1_runtime_tower"]
          event_values: ["PASS"]
        severity: high
        label: 'P1 runtime Taylor tower: derivative^d passes to d=8 and closes ESH-0118'
        action: ./scripts/run_ad_depth.sh

      - runtime_event:
          event_kinds: [mono_equiv]
          event_names: ["ad_taylor_p2_monomorphization"]
          event_values: ["PASS"]
        severity: high
        label: 'P2 compile-time-K monomorphized towers match runtime towers bit-exactly'
        action: run_mono_equiv_ad_taylor_gate

      - runtime_event:
          event_kinds: [mono_equiv]
          event_names: ["ad_taylor_p3_jet8_subsumed"]
          event_values: ["PASS"]
        severity: high
        label: 'P3 JET8 route is subsumed by tagged Taylor towers without regression'
        action: run_mono_equiv_ad_taylor_gate

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["jit_cache_hit_invalidates"]
          event_values: ["PASS"]
        severity: medium
        label: 'eshkol-run -r persistent cache hits and source edits invalidate'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["native_image_io_no_stb"]
          event_values: ["PASS"]
        severity: medium
        label: 'image-read uses platform APIs, not bundled deps/stb'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["pgo_pipeline_works"]
          event_values: ["PASS"]
        severity: medium
