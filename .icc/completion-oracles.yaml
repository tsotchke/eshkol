# ICC completion oracles for the Eshkol compiler.
#
# Each oracle is a target name plus a list of `requires` criteria. ICC's
# `completion-oracle` subcommand checks that each criterion has evidence
# (test indexed, contract present, runtime check passed, no stub paths)
# and produces a verdict the assistant can plan against.
#
# Targets here mirror the milestone structure in ROADMAP.md / ESHKOL_VERSION.txt
# and the agent-blocker matrix in plans/note-for-eshkol-agent.md.

oracles:
  # ─────────────────────────────────────────────────────────────────
  # Main compiler readiness — the everyday "is the compiler healthy"
  # check. Used by `icc next-action --target eshkol-compiler` to surface
  # what's blocking work today.
  #
  # Each runtime_event criterion looks for a JSON-L line in
  # scripts/icc_traces/*.jsonl with kind:"eshkol_smoke" name:<id>
  # value:"PASS". scripts/run_icc_smoke.sh produces the trace; running
  # it before `icc completion-oracle` flips this oracle to green.
  # ─────────────────────────────────────────────────────────────────
  - name: eshkol-compiler-readiness
    aliases: [eshkol, compiler, eshkol-compiler]
    requires:
      - test_evidence: true
        severity: high
        label: v1.2 edge-case tests are indexed and runnable
        action: cd build && cmake --build . && ctest -R v1_2

      - no_contract_gap:
          - flag_without_contract
          - state_key_produced_without_consumer
          - state_key_consumed_without_producer
          - artifact_without_test_or_trace
          - missing_expected_contract_kind
        severity: high
        label: Compiler subsystems wire together without dangling contracts
        action: fix_contract_graph_gap

      - no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: Codegen / runtime / type-checker production paths are real
        action: wire_real_path_or_classify_stub

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["llvm_module_verifier_clean"]
          event_values: ["PASS"]
        severity: high
        label: LLVM verifyModule passes on the codegen output
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["aot_link_succeeds"]
          event_values: ["PASS"]
        severity: high
        label: eshkol-run produces a runnable binary from an .esk file
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["jit_repl_clean_exit"]
          event_values: ["PASS"]
        severity: medium
        label: eshkol-repl + eshkol-run -r return cleanly on a smoke input
        action: ./scripts/run_icc_smoke.sh

  # ─────────────────────────────────────────────────────────────────
  # Agent-FFI readiness — the contract the eshkol-agent depends on.
  # When this oracle goes green, the agent's three blockers (HTTP,
  # subprocess, session persistence) are all cleared on the eshkol side.
  # See plans/note-for-eshkol-agent.md for the originating ranked list.
  # ─────────────────────────────────────────────────────────────────
  - name: agent-ffi-ready
    aliases: [agent-ffi, eshkol-agent-runtime]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["native_http_get_works"]
          event_values: ["PASS"]
        severity: high
        label: qllm_http_get returns a real response body for live HTTPS
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["native_http_post_json_works"]
          event_values: ["PASS"]
        severity: high
        label: qllm_http_post_json round-trips JSON to a real endpoint
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["subprocess_argv_safe"]
          event_values: ["PASS"]
        severity: high
        label: process-spawn-argv runs argv directly without shell interpretation
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["subprocess_pid_exposed"]
          event_values: ["PASS"]
        severity: medium
        label: process-pid returns the real OS PID of the spawned child
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["sqlite_text_round_trip"]
          event_values: ["PASS"]
        severity: high
        label: sqlite-column-text round-trips ≥ 30 KB session JSON without truncation
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["aot_binaries_link_agent_ffi"]
          event_values: ["PASS"]
        severity: high
        label: eshkol-run -o produces binaries that link agent FFI when (require agent.…) appears
        action: ./scripts/run_icc_smoke.sh

      - test_evidence: true
        severity: medium
        label: Agent FFI smoke tests indexed (http_server_smoke_test, etc.)
        action: ensure_tests_under_v1_2_edge_cases

  # ─────────────────────────────────────────────────────────────────
  # Stdlib readiness — every stdlib module under lib/core has a
  # provide form, a callable through stdlib.o, and at least one test.
  # Catches the common "added a function, forgot the type-checker
  # entry / known builtins list" regression class.
  # ─────────────────────────────────────────────────────────────────
  - name: stdlib-ready
    aliases: [stdlib, core-stdlib]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["stdlib_o_loads"]
          event_values: ["PASS"]
        severity: high
        label: build/stdlib.o exists and loads at JIT and AOT link time
        action: cmake --build build --target stdlib

      - test_evidence: true
        severity: medium
        label: Each stdlib module has a regression test
        action: add_test_per_stdlib_module

      - no_stubbed_paths:
          - production_fallback
          - external_backend_required
        severity: medium
        label: Stdlib functions don't shell-out for things they should compute
        action: replace_shell_fallback_with_native_path

  # ─────────────────────────────────────────────────────────────────
  # v1.2 release readiness — the gate that flips green when v1.2 ships.
  # Tracks the 7 roadmap items + the agent-blocker matrix.
  # ─────────────────────────────────────────────────────────────────
  - name: v1.2-release
    aliases: [v1.2, release-1.2, scale]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["model_serialization_round_trip"]
          event_values: ["PASS"]
        severity: high
        label: model-save / model-load preserve weights bit-exact
        action: verify_with_tensor_io_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["image_io_works"]
          event_values: ["PASS"]
        severity: medium
        label: image-read returns a tensor of the correct shape
        action: run_image_io_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["per_thread_arena_works"]
          event_values: ["PASS"]
        severity: high
        label: parallel-map can allocate per-thread without cross-thread aliasing
        action: run_parallel_arena_test

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["error_messages_have_source_locations"]
          event_values: ["PASS"]
        severity: medium
        label: Compile errors include file:line:col + caret
        action: keep_eshkol_error_at_pipeline

      - test_evidence: true
        severity: high
        label: Full 16-lane CI matrix indexed and green
        action: gh_workflow_view_main_after_push

      - no_contract_gap:
          - missing_expected_contract_kind
          - flag_without_contract
        severity: high
        label: All v1.2 features have wired contracts (plan ↔ test ↔ runtime)
        action: regenerate_contract_graph

      - no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: No silent fallbacks in v1.2 production paths
        action: classify_or_replace_each_stub

  # ─────────────────────────────────────────────────────────────────
  # v1.3-evolve readiness — tracks the v1.3 roadmap items in
  # ROADMAP.md.  Mirrors the v1.2 oracle's shape: each line item that
  # has a source-tree contract gets a runtime_event probe via
  # scripts/run_icc_smoke.sh.  Shipped items must emit PASS; planned
  # items may remain as explicit FAIL probes until their implementation
  # lands.
  #
  # The three "[x]" items already in v1.3-evolve (string interpolation,
  # named keyword arguments, let-match) get smoke probes that pin
  # their behavior so a regression downstream surfaces immediately.
  # ─────────────────────────────────────────────────────────────────
  - name: v1.3-evolve
    aliases: [v1.3, release-1.3, evolve]
    requires:
      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["string_interpolation_works"]
          event_values: ["PASS"]
        severity: high
        label: '"…~{expr}…" parses and evaluates the embedded expression'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["keyword_args_work"]
          event_values: ["PASS"]
        severity: high
        label: '(f #:k v) bind by name and reorder freely'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["let_match_destructures"]
          event_values: ["PASS"]
        severity: high
        label: '(let-match (((list a b) (list 1 2))) …) destructures and binds'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["define_library_import_works"]
          event_values: ["PASS"]
        severity: high
        label: '(define-library …) + (import …) round-trip works in a single file'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["matmul_kernel_grad_nonzero"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through tensor-matmul to the kernel (input2) side'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_conv2d_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through conv2d to the kernel operand'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_batchnorm_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through batch-norm to the gamma operand'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_layernorm_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through layer-norm to the gamma operand'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["ad_input2_attention_grad_works"]
          event_values: ["PASS"]
        severity: high
        label: 'gradient flows through scaled-dot-attention to K/V operands'
        action: ./scripts/run_icc_smoke.sh

      # -- arbitrary-order AD Taylor-tower v1.3 track --
      - runtime_event:
          event_kinds: [ad_depth]
          event_names: ["ad_taylor_p1_runtime_tower"]
          event_values: ["PASS"]
        severity: high
        label: 'P1 runtime Taylor tower: derivative^d passes to d=8 and closes ESH-0118'
        action: ./scripts/run_ad_depth.sh

      - runtime_event:
          event_kinds: [mono_equiv]
          event_names: ["ad_taylor_p2_monomorphization"]
          event_values: ["PASS"]
        severity: high
        label: 'P2 compile-time-K monomorphized towers match runtime towers bit-exactly'
        action: run_mono_equiv_ad_taylor_gate

      - runtime_event:
          event_kinds: [mono_equiv]
          event_names: ["ad_taylor_p3_jet8_subsumed"]
          event_values: ["PASS"]
        severity: high
        label: 'P3 JET8 route is subsumed by tagged Taylor towers without regression'
        action: run_mono_equiv_ad_taylor_gate

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["jit_cache_hit_invalidates"]
          event_values: ["PASS"]
        severity: medium
        label: 'eshkol-run -r persistent cache hits and source edits invalidate'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["native_image_io_no_stb"]
          event_values: ["PASS"]
        severity: medium
        label: 'image-read uses platform APIs, not bundled deps/stb'
        action: ./scripts/run_icc_smoke.sh

      - runtime_event:
          event_kinds: [eshkol_smoke]
          event_names: ["pgo_pipeline_works"]
          event_values: ["PASS"]
        severity: medium
        label: 'cmake -DESHKOL_PGO=generate/use supports a profile-guided binary'
        action: ./scripts/run_icc_smoke.sh

      # ── depth-campaign + P7 pillar gates (v1.3-evolve expanded contract) ──
      # Each now-merged adversarial pillar must have recorded a PASS in its
      # own oracle-run trace for the release to be ready. These mirror the
      # standalone pillar oracles (recursion-depth, ad-depth, numeric-depth,
      # metaprog-depth, metamorphic-laws, sanitizer-fuzz-clean, depth-coverage)
      # and fold them into the release readiness contract.
      - runtime_event:
          event_kinds: [depth_coverage]
          event_names: ["depth_coverage_gate"]
          event_values: ["PASS"]
        severity: high
        label: 'Depth-coverage auditor: every composable construct has a registered sweep or tracked gap'
        action: python3 scripts/check_depth_coverage.py
      - runtime_event:
          event_kinds: [recursion_depth]
          event_names: ["recursion_depth_gate"]
          event_values: ["PASS"]
        severity: high
        label: 'Recursion/control depth sweep: no silent crash, no wrong value at any tested depth (-r and AOT)'
        action: ./scripts/run_recursion_depth.sh
      - runtime_event:
          event_kinds: [ad_depth]
          event_names: ["ad_depth_gate"]
          event_values: ["PASS"]
        severity: high
        label: 'Depth-parametric AD oracle: no construct regresses below its baseline max-correct-depth (-r and AOT)'
        action: ./scripts/run_ad_depth.sh
      - runtime_event:
          event_kinds: [numeric_depth]
          event_names: ["numeric_depth_sweep_clean"]
          event_values: ["PASS"]
        severity: high
        label: 'Numeric-tower depth sweep clean vs baseline (no new silent-wrong, no regressed max-correct-n)'
        action: python3 scripts/gen_numeric_depth.py && ./scripts/run_numeric_depth.sh
      - runtime_event:
          event_kinds: [metaprog_depth]
          event_names: ["metaprog_depth_sweep_clean"]
          event_values: ["PASS"]
        severity: high
        label: 'No metaprogramming/module family produces a WRONG value at any swept depth'
        action: ./scripts/run_metaprog_depth.sh
      - runtime_event:
          event_kinds: [metamorphic]
          event_names: ["metamorphic_gate"]
          event_values: ["PASS"]
        severity: high
        label: 'Deterministic metamorphic law corpus passes with only tracked XKNOWN violations'
        action: ./scripts/run_metamorphic.sh
      - runtime_event:
          event_kinds: [sanitizer_fuzz]
          event_names: ["sanitizer_fuzz_clean"]
          event_values: ["PASS"]
        severity: high
        label: 'Full ASan+UBSan fuzz/tests corpus has zero sanitizer signatures'
        action: ./scripts/run_sanitizer_fuzz.sh

      - test_evidence: true
        severity: high
        label: 'v1.3 edge-case tests are indexed and runnable'
        action: cd build && cmake --build . && ctest -R v1_3

      - no_contract_gap:
          - missing_expected_contract_kind
          - flag_without_contract
        severity: high
        label: 'All v1.3 features have wired contracts (plan ↔ test ↔ runtime)'
        action: regenerate_contract_graph

      - no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: 'No silent fallbacks in v1.3 production paths'
        action: classify_or_replace_each_stub

  # -----------------------------------------------------------------
  # Arbitrary-order AD Taylor-tower campaign -- cross-release gate.
  # The release gates below select the phase rows assigned to their
  # ROADMAP.md themes; this target keeps the whole P0..P12 campaign in
  # one place for ICC planning.
  # -----------------------------------------------------------------
  - name: ad-taylor-campaign
    aliases: [ad-taylor, arbitrary-order-ad, taylor-tower]
    requires:
      - runtime_event:
          event_kinds: [ad_depth]
          event_names: ["ad_taylor_p0_poc"]
          event_values: ["PASS"]
        severity: medium
        label: P0 recurrence POC matches analytic derivatives to d=8
        action: tests/ad_taylor_poc/run.sh

      - runtime_event:
          event_kinds: [ad_depth]
          event_names: ["ad_taylor_p1_runtime_tower"]
          event_values: ["PASS"]
        severity: high
        label: P1 runtime Taylor tower supports derivative^n and closes ESH-0118
        action: ./scripts/run_ad_depth.sh

      - runtime_event:
          event_kinds: [mono_equiv]
          event_names: ["ad_taylor_p2_monomorphization"]
          event_values: ["PASS"]
        severity: high
        label: P2 compile-time-K monomorphization equals runtime tower execution
        action: run_mono_equiv_ad_taylor_gate

      - runtime_event:
          event_kinds: [mono_equiv]
          event_names: ["ad_taylor_p3_jet8_subsumed"]
          event_values: ["PASS"]
        severity: high
        label: P3 JET8 behavior is preserved through the tagged tower route
        action: run_mono_equiv_ad_taylor_gate

      - runtime_event:
          event_kinds: [ad_exact]
          event_names: ["ad_taylor_p4_guw_multivariate"]
          event_values: ["PASS"]
        severity: high
        label: P4 GUW multivariate mixed partials match analytic references to d=8
        action: run_ad_exact_taylor_gate

      - runtime_event:
          event_kinds: [ad_reverse_highorder]
          event_names: ["ad_taylor_p5_reverse_over_taylor"]
          event_values: ["PASS"]
        severity: high
        label: P5 reverse-over-Taylor high-order gradient oracle passes under AOT
        action: run_ad_reverse_highorder_gate

      - runtime_event:
          event_kinds: [ad_exact]
          event_names: ["ad_taylor_p6_exact_coefficients"]
          event_values: ["PASS"]
        severity: high
        label: P6 rational/bignum Taylor coefficients are bit-exact vs symbolic oracle
        action: run_ad_exact_taylor_gate

      - runtime_event:
          event_kinds: [ad_tensor_highorder]
          event_names: ["ad_taylor_p7_tensor_towers"]
          event_values: ["PASS"]
        severity: high
        label: P7 tensor-valued towers pass high-order ML AD smoke tests
        action: run_ad_tensor_highorder_gate

      - runtime_event:
          event_kinds: [ad_validated_bounds]
          event_names: ["ad_taylor_p8_taylor_models"]
          event_values: ["PASS"]
        severity: high
        label: P8 Taylor-model bounds contain the true range and tighten with order
        action: run_ad_validated_bounds_gate

      - runtime_event:
          event_kinds: [ad_control_flow]
          event_names: ["ad_taylor_p9_control_flow"]
          event_values: ["PASS"]
        severity: high
        label: P9 towers pass through loops, branches, recursion, closures, named-let, map, and fold
        action: run_ad_control_flow_gate

      - runtime_event:
          event_kinds: [ad_reverse_highorder]
          event_names: ["ad_taylor_p10_checkpointed_reverse"]
          event_values: ["PASS"]
        severity: high
        label: P10 checkpointed high-order reverse matches dense tape within memory budget
        action: run_ad_reverse_highorder_gate

      - runtime_event:
          event_kinds: [ad_numerics]
          event_names: ["ad_taylor_p11_user_numerics"]
          event_values: ["PASS"]
        severity: medium
        label: P11 Taylor-series ODE, root, inversion, and continuation APIs converge
        action: run_ad_numerics_gate

      - runtime_event:
          event_kinds: [ad_sparse]
          event_names: ["ad_taylor_p12_sparse_highorder_tensors"]
          event_values: ["PASS"]
        severity: medium
        label: P12 sparse high-order tensors match dense recovery on tractable cases
        action: run_ad_sparse_gate

  # -----------------------------------------------------------------
  # v1.4-connection readiness -- adds the AD infrastructure track
  # assigned to v1.4 without replacing the networking/resource theme.
  # -----------------------------------------------------------------
  - name: v1.4-release
    aliases: [v1.4, release-1.4, connection]
    requires:
      - runtime_event:
          event_kinds: [ad_exact]
          event_names: ["ad_taylor_p4_guw_multivariate"]
          event_values: ["PASS"]
        severity: high
        label: P4 GUW multivariate mixed partials pass analytic oracle to d=8
        action: run_ad_exact_taylor_gate

      - runtime_event:
          event_kinds: [ad_exact]
          event_names: ["ad_taylor_p6_exact_coefficients"]
          event_values: ["PASS"]
        severity: high
        label: P6 exact-coefficient towers pass rational/bignum symbolic oracle
        action: run_ad_exact_taylor_gate

      - runtime_event:
          event_kinds: [ad_numerics]
          event_names: ["ad_taylor_p11_user_numerics"]
          event_values: ["PASS"]
        severity: medium
        label: P11 tower-based user numerics converge on ODE/root/inversion examples
        action: run_ad_numerics_gate

      - runtime_event:
          event_kinds: [v1_4_connection]
          event_names: ["connection_theme_deliverables"]
          event_values: ["PASS"]
        severity: high
        label: Placeholder for v1.4 networking, TLS, event loop, and linear resource deliverables
        action: replace_with_v1_4_connection_oracle

  # -----------------------------------------------------------------
  # v1.5-intelligence readiness -- high-order AD gates for the
  # differentiable-logic and neuro-symbolic ML theme.
  # -----------------------------------------------------------------
  - name: v1.5-release
    aliases: [v1.5, release-1.5, intelligence]
    requires:
      - runtime_event:
          event_kinds: [ad_reverse_highorder]
          event_names: ["ad_taylor_p5_reverse_over_taylor"]
          event_values: ["PASS"]
        severity: high
        label: P5 reverse-over-Taylor high-order gradient oracle passes under AOT
        action: run_ad_reverse_highorder_gate

      - runtime_event:
          event_kinds: [ad_tensor_highorder]
          event_names: ["ad_taylor_p7_tensor_towers"]
          event_values: ["PASS"]
        severity: high
        label: P7 tensor-valued towers cover high-order conv2d, attention, batchnorm, and layernorm AD
        action: run_ad_tensor_highorder_gate

      - runtime_event:
          event_kinds: [ad_control_flow]
          event_names: ["ad_taylor_p9_control_flow"]
          event_values: ["PASS"]
        severity: high
        label: P9 differentiable control-flow oracle passes through loops, branches, recursion, and closures
        action: run_ad_control_flow_gate

      - runtime_event:
          event_kinds: [ad_reverse_highorder]
          event_names: ["ad_taylor_p10_checkpointed_reverse"]
          event_values: ["PASS"]
        severity: medium
        label: P10 checkpointed high-order reverse begins the v1.5 to v1.7 memory-scaling bridge
        action: run_ad_reverse_highorder_gate

      - runtime_event:
          event_kinds: [v1_5_intelligence]
          event_names: ["intelligence_theme_deliverables"]
          event_values: ["PASS"]
        severity: high
        label: Placeholder for v1.5 symbol embeddings, soft unification, LSTM/GRU, differentiable logic, KB attention, and gradient estimators
        action: replace_with_v1_5_intelligence_oracle

  # ─────────────────────────────────────────────────────────────────
  # SDNC paper reproducibility — the headline claim from
  #   "The Self-Differentiating Neural Computer: Computable Transformers
  #    via Analytical Weight Construction" (tsotchke 2026).
  # The reference C bytecode VM and the analytically-constructed
  # transformer must agree bit-identically on outputs (paper §4.4) and
  # ideally on the full per-step state. scripts/run_sdnc_oracle.sh runs
  # the paper suite and writes summary events; per-program disagreement
  # also surfaces as sdnc_program FAIL records.
  # ─────────────────────────────────────────────────────────────────
  - name: sdnc-paper-reproducibility
    aliases: [sdnc, sdnc-paper, computable-transformers]
    requires:
      - runtime_event:
          event_kinds: [sdnc_paper_suite]
          event_names: ["output_agreement"]
          event_values: ["PASS"]
        severity: high
        label: All 71 programs produce bit-identical PRINT outputs (paper §4.4)
        action: ./scripts/run_sdnc_oracle.sh

