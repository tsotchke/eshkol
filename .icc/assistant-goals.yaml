# Eshkol-side assistant goals. Used by `icc next-action --target eshkol-…`
# to suggest what to work on next when no specific bug is queued.
#
# Order roughly tracks the agent's blocker urgency + the v1.2 milestone.
# Items get demoted to `done` (delete) once their oracle passes.

goals:
  - id: agent-blockers-cleared
    priority: high
    goal: All three eshkol-agent blockers (HTTP/SSE, subprocess pipe contract, durable session persistence) clear on the eshkol side
    reason: agent productivity is gated on these; everything else they need (live API calls, MCP, durable sessions) waits until the runtime contracts are real
    tags: [agent, ffi, blockers]

  - id: http-sse-streaming
    priority: high
    goal: Implement SSE streaming in agent_http_client.c (qllm_http_stream_open/next/done/close) so Anthropic streaming, server-sent events, and live token surfaces work
    depends_on: [agent-blockers-cleared]
    reason: sync HTTP shipped 2026-05-06; streaming is still stubbed. Without it the agent must batch-poll, which breaks the conversational UX
    tags: [http, streaming, agent]

  - id: or-null-miscompile-root-cause
    priority: high
    goal: Find and fix the codegen path that replaces a function body containing `(or X null-literal)` with "return null"
    reason: real agent code (services/mcp-client.esk, services/mcp-transport.esk) hit this; the workaround `(if X X '())` is everywhere and needs cleanup. Repro and notes in memory/project_229_or_null_repro.md
    tags: [codegen, agent, regression]

  - id: repl-no-return-verifier
    priority: high
    goal: Fix REPL/JIT %entry getting setup IR appended after `(raise …)` emits unreachable
    reason: AOT path is fixed (#244 partial). REPL still trips "Terminator found in middle of basic block %entry" which forces agent tests onto the slower compile-link-run harness. Trace plan in memory/project_244_partial_fix.md
    tags: [codegen, repl, jit]

  - id: parallel-test-fork-exhaustion
    priority: medium
    goal: "Diagnose and fix subprocess fork-exhaustion under heavy ctest load (`/bin/sh: fork: Resource temporarily unavailable`)"
    depends_on: [agent-blockers-cleared]
    reason: "basic single-thread spawn is fine; failure mode is concurrent ctest -j with shell pipelines. Likely zombie reaping or fd close ordering. Stress harness needed first"
    tags: [subprocess, runtime, test-harness]

  - id: stdlib-test-coverage-per-module
    priority: medium
    goal: Every module under lib/core has at least one regression test and a "known builtins" entry
    reason: silent stdlib regressions are caught by ICC oracle's stdlib-ready criterion, but only if a test exists for each. Currently coverage is patchy
    tags: [stdlib, tests]

  - id: v1.2-release-cut
    priority: medium
    goal: All v1.2 oracle criteria green; cut the v1.2-scale release
    depends_on: [agent-blockers-cleared, http-sse-streaming]
    reason: model serialization, image I/O, per-thread arenas, error messages — all the v1.2 roadmap items shipped, just need the gating audit and the release artifacts
    tags: [release, milestone]

  - id: v1.3-native-image-io
    priority: high
    goal: Replace deps/stb image I/O with native platform APIs (CoreGraphics on macOS, libpng/libjpeg/libwebp on Linux, GDI+ on Windows) and remove deps/stb from the tree
    reason: "Last remaining v1.3-evolve oracle FAIL (native_image_io_no_stb). Eshkol's policy is to not vendor third-party media decoders; v1.3 commits to native-only.  Touches lib/core/image_io.c plus CMake find_package() additions per platform."
    tags: [v1.3, media, vendoring]

  - id: v1.3-input2-conv-batchnorm-layernorm-attention
    priority: medium
    goal: Wire `input2` into the AD tape nodes created by the conv2d / batchnorm / layernorm / attention forward sites so gradient flows to both operands
    reason: "tensor-matmul already does this (verified by ICC matmul_kernel_grad_nonzero probe). The other four kernels emit tape nodes but leave `input2` null; the backward kernels in lib/backend/tensor_backward.cpp already gate on `if (node->input2)`."
    tags: [v1.3, autodiff, codegen]

  - id: v1.3-pgo-workload-and-merge
    priority: low
    goal: Pick a canonical PGO training workload + script the llvm-profdata merge step so `cmake -DESHKOL_PGO=use` is one-shot reproducible
    reason: "Build scaffold landed (cmake -DESHKOL_PGO=generate/use). What's missing is the documented sequence of `eshkol-run` invocations that produces a representative profile (probably v1_2 edge-case suite + the smoke harness + a couple of canonical examples)."
    tags: [v1.3, pgo, release-tooling]

  - id: v1.3-release-cut
    priority: low
    goal: All v1.3-evolve oracle criteria green; cut the v1.3-evolve release
    depends_on: [v1.3-native-image-io]
    reason: "Foundation landed: ICC oracle + production-audit profile + smoke probes + regression tests + PGO scaffold + ROADMAP audit (commit 7feeba03). 9/10 PASS, 1 WARN. The remaining WARN is the deps/stb removal."
    tags: [v1.3, release, milestone]

  - id: agent-side-migration
    priority: medium
    goal: Update eshkol-agent to use the new HTTP/subprocess contracts instead of the legacy "explicit unavailable" wrappers
    depends_on: [agent-blockers-cleared]
    reason: runtime now has real implementations; agent code hasn't switched yet. Bridge work in eshkol-agent, not eshkol itself
    tags: [agent, migration, cross-repo]

  - id: hardening-epics
    priority: low
    goal: Work through the hardening epics (memory-safety / input-validation / concurrency / resource-management / security-surface / determinism)
    depends_on: [v1.2-release-cut]
    reason: pre-1.0 stability surface; not blocking shipping but blocking "production ready" claim
    tags: [hardening, audit]
