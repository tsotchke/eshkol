name: Deploy Site

# Publish the committed site/static tree to GitHub Pages.
#
# Important: the public site must not rebuild site/src/main.esk during deploy.
# The website WASM is a release artifact checked into site/static; rebuilding it
# with a moving Linux runner/toolchain has produced browser-invalid WASM while
# still letting Pages report success. CI validates the compiler/WebAssembly
# import surface separately. This workflow is intentionally a static deploy with
# a browser-compile gate for the committed bundle.
#
# Trigger surface:
#   - site/src/**           — the .esk source that becomes eshkol-site.wasm
#   - site/static/**        — non-WASM assets (HTML, CSS, images, CNAME, JS glue)
#   - lib/**, src/**,
#     exe/**, CMakeLists.txt
#                           — anything the WASM compile output depends on;
#                             changing the compiler can change the .wasm even
#                             with main.esk untouched.
#   - root + docs/ markdown the site renders into HTML at deploy time
#   - scripts/build-site*.sh
#   - this workflow file itself
#
# What is NOT rebuilt here:
#   - site/static/eshkol-site.wasm, produced by scripts/build-site.sh
#   - site/static/eshkol-vm.{js,wasm}, produced with the Emscripten SDK
#
# Rebuild those locally and commit the outputs when the website source or VM
# browser bundle intentionally changes.

on:
  push:
    branches: [master]
    paths:
      - 'site/src/**'
      - 'site/static/**'
      - 'lib/**'
      - 'src/**'
      - 'exe/**'
      - 'CMakeLists.txt'
      - 'ESHKOL_LANGUAGE_GUIDE.md'
      - 'ESHKOL_QUICK_REFERENCE.md'
      - 'ROADMAP.md'
      - 'CONTRIBUTING.md'
      - 'docs/API_REFERENCE.md'
      - 'docs/FEATURE_MATRIX.md'
      - 'docs/QUICKSTART.md'
      - 'scripts/build-site.sh'
      - 'scripts/build-site-content.sh'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

# Share the `pages` concurrency group with any other deploy workflow so
# we never race the GitHub Pages backend.  Do not cancel an in-flight
# deploy — let it finish before this one starts.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: validate-site-artifact
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Validate committed site bundle
        shell: bash
        run: |
          set -euxo pipefail
          test -s site/static/eshkol-site.wasm
          test -s site/static/eshkol-vm.wasm
          test -s site/static/eshkol-runtime.js
          test -s site/static/index.html
          node <<'NODE'
          const fs = require('fs');
          const path = 'site/static/eshkol-site.wasm';
          const wasm = fs.readFileSync(path);
          const maxBytes = 5 * 1024 * 1024;
          if (wasm.length > maxBytes) {
            throw new Error(`${path} is ${wasm.length} bytes; refusing to deploy an oversized site WASM`);
          }
          WebAssembly.compile(wasm).then(
            () => console.log(`${path} compiles in the browser engine (${wasm.length} bytes)`),
            (err) => {
              console.error(`${path} is not browser-valid WebAssembly: ${err.message}`);
              process.exit(1);
            }
          );
          NODE

      # ---------- Stage + upload the GitHub Pages artefact ----------
      #
      # `actions/configure-pages` resolves the deployment target; the
      # upload step packages site/static as the Pages artefact under the
      # well-known name `github-pages` which `deploy-pages` (in the next
      # job) picks up automatically.
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/static

  deploy:
    name: deploy-site
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
