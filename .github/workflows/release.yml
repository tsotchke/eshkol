name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  LLVM_MAJOR: '21'

jobs:
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Eshkol ${{ github.ref_name }}
          body: |
            See CHANGELOG.md for full details.

            ## Highlights

            - **GPU acceleration**: Metal (Apple Silicon SF64) and CUDA (native float64)
            - **XLA backend**: Dual-mode StableHLO/MLIR + LLVM-direct tensor operations
            - **Parallel primitives**: Work-stealing thread pool (parallel-map, future/force)
            - **Exact arithmetic**: Bignums, rationals, complete R7RS numeric tower
            - **Consciousness engine**: 22 compiled primitives (logic, inference, workspace)
            - **Signal processing**: FFT, filters, Butterworth design
            - **35 test suites, 430 test files, 100% pass rate**

            ## Installation

            **macOS (Homebrew — recommended):**
            ```bash
            brew tap tsotchke/eshkol
            brew install eshkol
            ```

            **macOS (manual):**
            Download `eshkol-*-macos-arm64.tar.gz` (Apple Silicon) or `eshkol-*-macos-x64.tar.gz` (Intel).

            **Linux x64 (Debian/Ubuntu .deb):**
            ```bash
            sudo dpkg -i eshkol_*.deb
            ```

            **Linux x64/ARM64 (tarball):**
            Download `eshkol-*-linux-x64.tar.gz` or `eshkol-*-linux-arm64.tar.gz`.

            **Linux x64 with GPU/XLA acceleration:**
            - CUDA (NVIDIA GPUs): `eshkol-*-linux-x64-cuda.tar.gz`
            - XLA (StableHLO/MLIR): `eshkol-*-linux-x64-xla.tar.gz`

            **From Source:**
            ```bash
            git clone https://github.com/tsotchke/eshkol.git
            cd eshkol
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
            cmake --build build --parallel
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  build-and-upload:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: ubuntu-22.04-arm
            name: linux-arm64
          - os: macos-14
            name: macos-arm64
          - os: macos-15-large
            name: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM Repository (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y cmake ninja-build llvm-${LLVM_MAJOR} llvm-${LLVM_MAJOR}-dev libreadline-dev pkg-config libssl-dev libncurses-dev

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm@${LLVM_MAJOR} cmake ninja readline

      - name: Build
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LLVM_PREFIX="$(brew --prefix llvm@${LLVM_MAJOR})"
            export PATH="$LLVM_PREFIX/bin:$PATH"
            LLVM_FLAG="-DLLVM_CONFIG_EXECUTABLE=$LLVM_PREFIX/bin/llvm-config"
          else
            LLVM_FLAG="-DLLVM_CONFIG_EXECUTABLE=/usr/bin/llvm-config-${LLVM_MAJOR}"
          fi
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DESHKOL_REQUIRED_LLVM_MAJOR=${LLVM_MAJOR} "$LLVM_FLAG"
          cmake --build build --parallel

      - name: Run Tests
        run: ./scripts/run_all_tests.sh

      - name: Package
        run: |
          mkdir -p pkg/bin pkg/lib pkg/share/eshkol
          cp build/eshkol-run pkg/bin/
          cp build/eshkol-repl pkg/bin/
          cp build/stdlib.o pkg/lib/
          cp build/libeshkol-static.a pkg/lib/ || true
          cp lib/stdlib.esk pkg/share/eshkol/
          for dir in core math signal ml random web tensor; do
            if [ -d "lib/$dir" ]; then
              cp -r "lib/$dir" "pkg/share/eshkol/$dir"
            fi
          done
          cp README.md LICENSE pkg/
          tar -czvf eshkol-${{ github.ref_name }}-${{ matrix.name }}.tar.gz -C pkg .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: eshkol-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
          fail_on_unmatched_files: true

  build-debian-package:
    needs: create-release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM Repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update

      - name: Install Dependencies
        run: |
          sudo apt-get install -y cmake ninja-build llvm-${LLVM_MAJOR} llvm-${LLVM_MAJOR}-dev libreadline-dev dpkg-dev pkg-config libssl-dev libncurses-dev

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DESHKOL_REQUIRED_LLVM_MAJOR=${LLVM_MAJOR} -DLLVM_CONFIG_EXECUTABLE=/usr/bin/llvm-config-${LLVM_MAJOR}
          cmake --build build --parallel

      - name: Build Debian Package
        id: deb
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          ./scripts/build-deb.sh "$VERSION"
          ARCH=$(dpkg --print-architecture)
          echo "deb_file=eshkol_${VERSION}_${ARCH}.deb" >> $GITHUB_OUTPUT

      - name: Upload Debian Package
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.deb_file }}
          fail_on_unmatched_files: true

  build-debian-package-arm64:
    needs: create-release
    runs-on: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM Repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update

      - name: Install Dependencies
        run: |
          sudo apt-get install -y cmake ninja-build llvm-${LLVM_MAJOR} llvm-${LLVM_MAJOR}-dev libreadline-dev dpkg-dev pkg-config libssl-dev libncurses-dev

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DESHKOL_REQUIRED_LLVM_MAJOR=${LLVM_MAJOR} -DLLVM_CONFIG_EXECUTABLE=/usr/bin/llvm-config-${LLVM_MAJOR}
          cmake --build build --parallel

      - name: Build Debian Package
        id: deb
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          ./scripts/build-deb.sh "$VERSION"
          ARCH=$(dpkg --print-architecture)
          echo "deb_file=eshkol_${VERSION}_${ARCH}.deb" >> $GITHUB_OUTPUT

      - name: Upload Debian Package
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.deb.outputs.deb_file }}
          fail_on_unmatched_files: true

  build-xla:
    needs: create-release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build XLA Docker Image
        run: docker build -f docker/xla/Dockerfile --build-arg VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//') -t eshkol-xla .

      - name: Extract XLA Artifacts
        run: |
          docker create --name xla-extract eshkol-xla
          mkdir -p pkg/bin pkg/lib pkg/share/eshkol
          docker cp xla-extract:/app/build/eshkol-run pkg/bin/
          docker cp xla-extract:/app/build/eshkol-repl pkg/bin/
          docker cp xla-extract:/app/build/stdlib.o pkg/lib/
          docker cp xla-extract:/app/lib/stdlib.esk pkg/share/eshkol/
          docker cp xla-extract:/app/lib/core pkg/share/eshkol/core || true
          cp README.md LICENSE pkg/
          tar -czvf eshkol-${{ github.ref_name }}-linux-x64-xla.tar.gz -C pkg .
          docker rm xla-extract

      - name: Upload XLA Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: eshkol-${{ github.ref_name }}-linux-x64-xla.tar.gz
          fail_on_unmatched_files: true

  build-cuda:
    needs: create-release
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build CUDA Docker Image
        run: docker build -f docker/cuda/Dockerfile --build-arg VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//') -t eshkol-cuda .

      - name: Extract CUDA Artifacts
        run: |
          docker create --name cuda-extract eshkol-cuda
          mkdir -p pkg/bin pkg/lib pkg/share/eshkol
          docker cp cuda-extract:/app/build/eshkol-run pkg/bin/
          docker cp cuda-extract:/app/build/eshkol-repl pkg/bin/
          docker cp cuda-extract:/app/build/stdlib.o pkg/lib/
          docker cp cuda-extract:/app/lib/stdlib.esk pkg/share/eshkol/
          docker cp cuda-extract:/app/lib/core pkg/share/eshkol/core || true
          cp README.md LICENSE pkg/
          tar -czvf eshkol-${{ github.ref_name }}-linux-x64-cuda.tar.gz -C pkg .
          docker rm cuda-extract

      - name: Upload CUDA Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: eshkol-${{ github.ref_name }}-linux-x64-cuda.tar.gz
          fail_on_unmatched_files: true

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-22.04
    # Only update Homebrew for stable releases (not alpha/beta/rc)
    if: ${{ !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'rc') }}

    steps:
      - uses: actions/checkout@v4

      - name: Calculate SHA256
        id: sha
        run: |
          SHA256=$(curl -sL https://github.com/tsotchke/eshkol/archive/${{ github.ref_name }}.tar.gz | shasum -a 256 | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update Homebrew Formula
        run: |
          VERSION=${{ github.ref_name }}
          SHA256=${{ steps.sha.outputs.sha256 }}

          # Update the formula file
          sed -i "s|url \"https://github.com/tsotchke/eshkol/archive/.*\.tar\.gz\"|url \"https://github.com/tsotchke/eshkol/archive/${VERSION}.tar.gz\"|" packaging/homebrew/eshkol.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" packaging/homebrew/eshkol.rb

      - name: Push to Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tsotchke/homebrew-eshkol.git tap
          cp packaging/homebrew/eshkol.rb tap/Formula/eshkol.rb
          cd tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/eshkol.rb
          git commit -m "Update eshkol to ${{ github.ref_name }}"
          git push
