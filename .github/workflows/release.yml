name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: Candidate tag label used only for dry-run asset names
        required: true
        default: v1.3.3-evolve
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  LLVM_MAJOR: '21'
  WINDOWS_LLVM_SDK_VERSION: '21.1.8'
  # A manual dispatch is always non-publishing. Its explicit candidate label
  # lets the dry-run archives use the exact names the later tag run will use.
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.candidate_tag || github.ref_name }}

jobs:
  unix-release-matrix:
    name: release-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-lite
            runner: ubuntu-22.04
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
          - name: linux-arm64-lite
            runner: ubuntu-22.04-arm
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
          - name: linux-x64-xla
            runner: ubuntu-22.04
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
          - name: linux-arm64-xla
            runner: ubuntu-22.04-arm
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
          - name: linux-x64-cuda
            runner: ubuntu-22.04
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_command: ./scripts/run_gpu_tests.sh
          - name: linux-arm64-cuda
            runner: ubuntu-22.04-arm
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_command: ./scripts/run_gpu_tests.sh
          - name: macos-arm64-lite
            runner: macos-14
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
          - name: macos-x64-lite
            runner: macos-15-intel
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
          - name: macos-arm64-xla
            runner: macos-14
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
          - name: macos-x64-xla
            runner: macos-15-intel
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag label
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "Invalid release tag label: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Add LLVM Repository (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          apt_update() {
            for attempt in 1 2 3; do
              if sudo apt-get update -o Acquire::Retries=5; then
                return 0
              fi
              sudo rm -rf /var/lib/apt/lists/*
              sleep $((attempt * 15))
            done
            sudo apt-get update -o Acquire::Retries=5
          }
          apt_update

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-${LLVM_MAJOR} llvm-${LLVM_MAJOR}-dev lld-${LLVM_MAJOR} \
            libreadline-dev pkg-config \
            libssl-dev libncurses-dev \
            libpcre2-dev libsqlite3-dev \
            libpng-dev libjpeg-dev libwebp-dev \
            git python3
          # Keep release builds aligned with CI: generated AArch64
          # executables use -fuse-ld=lld, which resolves unversioned
          # ld.lld from PATH.
          sudo ln -sf "/usr/bin/ld.lld-${LLVM_MAJOR}" /usr/bin/ld.lld
          ld.lld --version

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install llvm@${LLVM_MAJOR} cmake ninja readline pcre2 sqlite

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          BUILD_DIR="${{ matrix.build_dir }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LLVM_PREFIX="$(brew --prefix llvm@${LLVM_MAJOR})"
            export PATH="$LLVM_PREFIX/bin:$PATH"
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config"
          else
            LLVM_CONFIG="/usr/bin/llvm-config-${LLVM_MAJOR}"
          fi

          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DESHKOL_REQUIRED_LLVM_MAJOR="${LLVM_MAJOR}" \
            -DLLVM_CONFIG_EXECUTABLE="$LLVM_CONFIG" \
            -DESHKOL_XLA_ENABLED=${{ matrix.xla_enabled }} \
            -DESHKOL_GPU_ENABLED=${{ matrix.gpu_enabled }}

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build "${{ matrix.build_dir }}" --parallel

      - name: Check WASM env imports
        if: matrix.xla_enabled == 'OFF' && matrix.gpu_enabled == 'OFF' && matrix.build_dir == 'build'
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          python3 scripts/check_wasm_imports.py --build-dir "$BUILD_DIR"

      - name: Run Tests
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          export ESHKOL_HTTP_SERVER_SMOKE_TIMEOUT="${ESHKOL_HTTP_SERVER_SMOKE_TIMEOUT:-600}"
          export ESHKOL_REPL_MACHINE_READY_TIMEOUT="${ESHKOL_REPL_MACHINE_READY_TIMEOUT:-600}"
          export ESHKOL_REPL_MACHINE_DONE_TIMEOUT="${ESHKOL_REPL_MACHINE_DONE_TIMEOUT:-180}"
          export ESHKOL_EDGE_FAILURE_LINES="${ESHKOL_EDGE_FAILURE_LINES:-80}"
          ${{ matrix.test_command }}

      - name: Package Release Asset
        shell: bash
        run: |
          set -euxo pipefail
          archive_root="eshkol-${RELEASE_TAG}-${{ matrix.name }}"
          pkg_dir="$RUNNER_TEMP/$archive_root"
          mkdir -p "$pkg_dir/bin" "$pkg_dir/lib/eshkol" "$pkg_dir/share/eshkol/lib"

          cp "${{ matrix.build_dir }}/eshkol-run" "$pkg_dir/bin/"
          cp "${{ matrix.build_dir }}/eshkol-repl" "$pkg_dir/bin/"
          cp "${{ matrix.build_dir }}/stdlib.o" "$pkg_dir/lib/"
          cp "${{ matrix.build_dir }}/stdlib.o" "$pkg_dir/lib/eshkol/"
          cp "${{ matrix.build_dir }}/stdlib.bc" "$pkg_dir/lib/"
          cp "${{ matrix.build_dir }}/stdlib.bc" "$pkg_dir/lib/eshkol/"
          runtime_archive="${{ matrix.build_dir }}/libeshkol-runtime.a"
          test -s "$runtime_archive"
          cp "$runtime_archive" "$pkg_dir/lib/"
          cp "$runtime_archive" "$pkg_dir/lib/eshkol/"

          cp "lib/stdlib.esk" "$pkg_dir/share/eshkol/"
          if [[ -f "lib/math.esk" ]]; then
            cp "lib/math.esk" "$pkg_dir/share/eshkol/"
          fi

          while IFS= read -r -d '' source_file; do
            rel_path="${source_file#lib/}"
            dest_path="$pkg_dir/share/eshkol/lib/$rel_path"
            mkdir -p "$(dirname "$dest_path")"
            cp "$source_file" "$dest_path"
          done < <(find lib -type f -name '*.esk' -print0)

          for doc in README.md LICENSE CHANGELOG.md RELEASE_NOTES.md; do
            if [[ -f "$doc" ]]; then
              cp "$doc" "$pkg_dir/"
            fi
          done

          python3 scripts/verify_release_package.py \
            --package-dir "$pkg_dir" \
            --smoke-source "tests/toolchain/windows-smoke.esk" \
            --expected-version "$RELEASE_TAG"

          tar -czf "$RUNNER_TEMP/$archive_root.tar.gz" -C "$RUNNER_TEMP" "$archive_root"

      - name: Upload Packaged Asset
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.name }}
          path: ${{ runner.temp }}/eshkol-${{ env.RELEASE_TAG }}-${{ matrix.name }}.tar.gz
          if-no-files-found: error

  windows-release-matrix:
    name: release-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: windows-x64-lite
            runner: windows-latest
            arch: x64
            llvm_suffix: x86_64
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_mode: windows-lite
          - name: windows-arm64-lite
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_mode: windows-lite
          - name: windows-x64-xla
            runner: windows-latest
            arch: x64
            llvm_suffix: x86_64
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_mode: xla
          - name: windows-arm64-xla
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_mode: xla
          - name: windows-x64-cuda
            runner: windows-latest
            arch: x64
            llvm_suffix: x86_64
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_mode: gpu
          - name: windows-arm64-cuda
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_mode: gpu

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag label
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:RELEASE_TAG -notmatch '^v[0-9A-Za-z][0-9A-Za-z._-]*$') {
            throw "Invalid release tag label: $env:RELEASE_TAG"
          }

      - name: Restore LLVM SDK Cache
        id: llvm-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\src\clang+llvm-${{ env.WINDOWS_LLVM_SDK_VERSION }}-${{ matrix.llvm_suffix }}-pc-windows-msvc
          key: windows-llvm-sdk-${{ matrix.arch }}-${{ env.WINDOWS_LLVM_SDK_VERSION }}

      - name: Install LLVM SDK
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmVersion = '${{ env.WINDOWS_LLVM_SDK_VERSION }}'
          $llvmRoot = "C:\src\clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc"
          $llvmCmakeDir = "$llvmRoot\lib\cmake\llvm"
          $archive = "$env:RUNNER_TEMP\llvm-${{ matrix.arch }}-$llvmVersion.tar.xz"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc.tar.xz"

          New-Item -ItemType Directory -Force -Path 'C:\src' | Out-Null
          if (Test-Path $llvmRoot) {
            Remove-Item -LiteralPath $llvmRoot -Recurse -Force
          }

          Write-Host "Downloading $url"
          curl.exe --fail --location --retry 5 --retry-delay 5 --retry-all-errors --output $archive $url
          if ($LASTEXITCODE -ne 0) { throw "curl download failed (exit $LASTEXITCODE)" }

          Write-Host "Extracting..."
          tar -xf $archive -C C:\src
          if ($LASTEXITCODE -ne 0) { throw "tar extraction failed (exit $LASTEXITCODE)" }

          if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
            throw "LLVMConfig.cmake not found at $llvmCmakeDir - extraction may have failed"
          }

          Write-Host "LLVM $llvmVersion ${{ matrix.arch }} ready at $llvmRoot"

      - name: Resolve LLVM SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmVersion = '${{ env.WINDOWS_LLVM_SDK_VERSION }}'
          $llvmRoot = "C:\src\clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc"
          $llvmCmakeDir = "$llvmRoot\lib\cmake\llvm"

          if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
            throw "LLVMConfig.cmake not found at $llvmCmakeDir - extraction may have failed"
          }

          Write-Host "LLVM $llvmVersion ${{ matrix.arch }} ready at $llvmRoot"
          "LLVM_DIR=$llvmCmakeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LLVM_HOME=$llvmRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$llvmRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Save LLVM SDK Cache
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\src\clang+llvm-${{ env.WINDOWS_LLVM_SDK_VERSION }}-${{ matrix.llvm_suffix }}-pc-windows-msvc
          key: windows-llvm-sdk-${{ matrix.arch }}-${{ env.WINDOWS_LLVM_SDK_VERSION }}

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $platform = if ('${{ matrix.arch }}' -eq 'arm64') { 'ARM64' } else { 'x64' }
          $hostCxx = "$env:LLVM_HOME\bin\clang++.exe"
          if (-not (Test-Path $hostCxx)) {
            throw "clang++.exe not found in LLVM SDK at $hostCxx"
          }
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found; cannot locate a Visual Studio generator"
          }
          $cmakeHelp = (cmake --help) -join "`n"
          $generator = $null
          foreach ($candidate in @(
              @{ name = 'Visual Studio 18 2026'; version = '[18.0,19.0)' },
              @{ name = 'Visual Studio 17 2022'; version = '[17.0,18.0)' }
            )) {
            if ($cmakeHelp -notmatch [regex]::Escape($candidate.name)) {
              continue
            }
            $install = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -version $candidate.version -property installationPath
            if ($LASTEXITCODE -eq 0 -and $install) {
              $generator = $candidate.name
              Write-Host "Using CMake generator '$generator' from $install"
              break
            }
          }
          if (-not $generator) {
            throw "No supported Visual Studio CMake generator found. Install VS 2022+ with MSBuild, or update the generator candidate list."
          }
          cmake -S . -B '${{ matrix.build_dir }}' `
            -G $generator `
            -A $platform `
            -T ClangCL `
            -DBUILD_REPL=ON `
            -DESHKOL_BUILD_TESTS=OFF `
            -DESHKOL_REQUIRED_LLVM_MAJOR=${{ env.LLVM_MAJOR }} `
            -DESHKOL_HOST_CXX_COMPILER="$hostCxx" `
            -DESHKOL_XLA_ENABLED=${{ matrix.xla_enabled }} `
            -DESHKOL_GPU_ENABLED=${{ matrix.gpu_enabled }} `
            -DLLVM_DIR="$env:LLVM_DIR"

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $targets = @('eshkol-run', 'eshkol-repl', 'eshkol-runtime', 'stdlib')
          if ('${{ matrix.test_mode }}' -eq 'xla') {
            $targets += 'xla_codegen_test'
          }
          cmake --build '${{ matrix.build_dir }}' --config Release --target @($targets) --parallel

      - name: Run Tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\run_all_tests.ps1 -BuildDir ".\${{ matrix.build_dir }}" -SkipConfigureBuild -Mode '${{ matrix.test_mode }}'
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package Release Asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $archiveRoot = "eshkol-$env:RELEASE_TAG-${{ matrix.name }}"
          $pkgDir = Join-Path $env:RUNNER_TEMP $archiveRoot
          $binDir = Join-Path $pkgDir 'bin'
          $libDir = Join-Path $pkgDir 'lib'
          $libEshkolDir = Join-Path $libDir 'eshkol'
          $shareDir = Join-Path $pkgDir 'share\eshkol'
          $shareLibDir = Join-Path $shareDir 'lib'
          $binaryDir = Join-Path '${{ matrix.build_dir }}' 'Release'
          $stdlibObject = Join-Path '${{ matrix.build_dir }}' 'stdlib.o'
          $stdlibBitcode = Join-Path '${{ matrix.build_dir }}' 'stdlib.bc'
          $runtimeLibrary = Join-Path $binaryDir 'eshkol-runtime.lib'
          if (-not (Test-Path $stdlibObject)) {
            $stdlibCandidate = Join-Path $binaryDir 'stdlib.o'
            if (Test-Path $stdlibCandidate) {
              $stdlibObject = $stdlibCandidate
            } else {
              throw "stdlib.o was not found in '${{ matrix.build_dir }}' or '$binaryDir'"
            }
          }
          if (-not (Test-Path $stdlibBitcode)) {
            $stdlibBitcodeCandidate = Join-Path $binaryDir 'stdlib.bc'
            if (Test-Path $stdlibBitcodeCandidate) {
              $stdlibBitcode = $stdlibBitcodeCandidate
            } else {
              throw "stdlib.bc was not found in '${{ matrix.build_dir }}' or '$binaryDir'"
            }
          }
          if (-not (Test-Path $runtimeLibrary -PathType Leaf)) {
            $runtimeLibraryCandidate = Join-Path '${{ matrix.build_dir }}' 'eshkol-runtime.lib'
            if (Test-Path $runtimeLibraryCandidate -PathType Leaf) {
              $runtimeLibrary = $runtimeLibraryCandidate
            } else {
              throw "eshkol-runtime.lib was not found in '${{ matrix.build_dir }}' or '$binaryDir'"
            }
          }

          New-Item -ItemType Directory -Force -Path $binDir, $libDir, $libEshkolDir, $shareDir, $shareLibDir | Out-Null

          Copy-Item -LiteralPath (Join-Path $binaryDir 'eshkol-run.exe') -Destination $binDir
          Copy-Item -LiteralPath (Join-Path $binaryDir 'eshkol-repl.exe') -Destination $binDir

          Get-ChildItem -Path (Join-Path $binaryDir '*.dll') -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination $binDir
          }

          Copy-Item -LiteralPath $stdlibObject -Destination $libDir
          Copy-Item -LiteralPath $stdlibObject -Destination $libEshkolDir
          Copy-Item -LiteralPath $stdlibBitcode -Destination $libDir
          Copy-Item -LiteralPath $stdlibBitcode -Destination $libEshkolDir
          Copy-Item -LiteralPath $runtimeLibrary -Destination $libDir
          Copy-Item -LiteralPath $runtimeLibrary -Destination $libEshkolDir

          Copy-Item -LiteralPath 'lib\stdlib.esk' -Destination $shareDir
          if (Test-Path 'lib\math.esk') {
            Copy-Item -LiteralPath 'lib\math.esk' -Destination $shareDir
          }

          $libRoot = (Resolve-Path 'lib').Path
          Get-ChildItem -Path 'lib' -Recurse -File -Filter '*.esk' | ForEach-Object {
            $relativePath = [System.IO.Path]::GetRelativePath($libRoot, $_.FullName)
            $destinationPath = Join-Path $shareLibDir $relativePath
            $destinationDir = Split-Path -Parent $destinationPath
            if (-not (Test-Path $destinationDir)) {
              New-Item -ItemType Directory -Force -Path $destinationDir | Out-Null
            }
            Copy-Item -LiteralPath $_.FullName -Destination $destinationPath
          }

          foreach ($doc in @('README.md', 'LICENSE', 'CHANGELOG.md', 'RELEASE_NOTES.md')) {
            if (Test-Path $doc) {
              Copy-Item -LiteralPath $doc -Destination $pkgDir
            }
          }

          python scripts/verify_release_package.py `
            --package-dir "$pkgDir" `
            --smoke-source "tests/toolchain/windows-smoke.esk" `
            --expected-version "$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) {
            throw "release package smoke failed with exit code $LASTEXITCODE"
          }

          $archivePath = Join-Path $env:RUNNER_TEMP "$archiveRoot.zip"
          if (Test-Path $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          Compress-Archive -Path $pkgDir -DestinationPath $archivePath -CompressionLevel Optimal

      - name: Upload Packaged Asset
        uses: actions/upload-artifact@v7
        with:
          name: release-asset-${{ matrix.name }}
          path: ${{ runner.temp }}\eshkol-${{ env.RELEASE_TAG }}-${{ matrix.name }}.zip
          if-no-files-found: error

  publish-release:
    name: publish-release
    runs-on: ubuntu-22.04
    needs:
      - unix-release-matrix
      - windows-release-matrix

    steps:
      - uses: actions/checkout@v6

      - name: Download Packaged Assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-asset-*
          merge-multiple: true

      - name: Validate Release Asset Set
        shell: bash
        run: |
          set -euo pipefail

          expected=(
            "eshkol-${RELEASE_TAG}-linux-x64-lite.tar.gz"
            "eshkol-${RELEASE_TAG}-linux-arm64-lite.tar.gz"
            "eshkol-${RELEASE_TAG}-linux-x64-xla.tar.gz"
            "eshkol-${RELEASE_TAG}-linux-arm64-xla.tar.gz"
            "eshkol-${RELEASE_TAG}-linux-x64-cuda.tar.gz"
            "eshkol-${RELEASE_TAG}-linux-arm64-cuda.tar.gz"
            "eshkol-${RELEASE_TAG}-macos-arm64-lite.tar.gz"
            "eshkol-${RELEASE_TAG}-macos-x64-lite.tar.gz"
            "eshkol-${RELEASE_TAG}-macos-arm64-xla.tar.gz"
            "eshkol-${RELEASE_TAG}-macos-x64-xla.tar.gz"
            "eshkol-${RELEASE_TAG}-windows-x64-lite.zip"
            "eshkol-${RELEASE_TAG}-windows-arm64-lite.zip"
            "eshkol-${RELEASE_TAG}-windows-x64-xla.zip"
            "eshkol-${RELEASE_TAG}-windows-arm64-xla.zip"
            "eshkol-${RELEASE_TAG}-windows-x64-cuda.zip"
            "eshkol-${RELEASE_TAG}-windows-arm64-cuda.zip"
          )

          cd dist
          missing=0
          for asset in "${expected[@]}"; do
            if [[ ! -s "$asset" ]]; then
              echo "Missing release asset: $asset" >&2
              missing=1
            fi
          done

          asset_count="$(find . -maxdepth 1 -type f ! -name SHA256SUMS.txt | wc -l | tr -d ' ')"
          if [[ "$asset_count" -ne "${#expected[@]}" ]]; then
            echo "Expected ${#expected[@]} release assets, found $asset_count:" >&2
            find . -maxdepth 1 -type f -print | sort >&2
            missing=1
          fi

          exit "$missing"

      - name: Generate Checksums
        shell: bash
        run: |
          set -euxo pipefail
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Prepare Curated Release Notes
        shell: bash
        run: |
          set -euo pipefail
          expected_heading="# Eshkol ${RELEASE_TAG} — Release Notes"
          actual_heading="$(head -n 1 RELEASE_NOTES.md)"
          if [[ "$actual_heading" != "$expected_heading" ]]; then
            echo "Release-notes heading mismatch" >&2
            echo "expected: $expected_heading" >&2
            echo "actual:   $actual_heading" >&2
            exit 1
          fi
          awk 'NR == 1 { print; next } /^---$/ { exit } { print }' \
            RELEASE_NOTES.md > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

      - name: Upload Validated Dry-Run Assets
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: release-dry-run-${{ github.sha }}
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $RELEASE_TAG already exists; refusing to overwrite or append assets."
            echo "Delete the failed draft/release manually before rerunning this tag workflow."
            exit 1
          fi

          prerelease_flags=()
          if [[ "$RELEASE_TAG" == *alpha* ||
                "$RELEASE_TAG" == *beta* ||
                "$RELEASE_TAG" == *rc* ]]; then
            prerelease_flags+=(--prerelease)
          fi

          # gh creates the release as a draft, uploads assets, then publishes it.
          # That avoids a public partial release if the upload is interrupted.
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Eshkol $RELEASE_TAG" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "${prerelease_flags[@]}" \
            dist/*

  bump-homebrew-tap:
    name: bump-homebrew-tap
    runs-on: ubuntu-22.04
    if: github.event_name == 'push'
    needs:
      - publish-release
    steps:
      - name: Update Formula in tsotchke/homebrew-eshkol
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${TAP_TOKEN:-}" ]]; then
            echo "::notice::HOMEBREW_TAP_TOKEN secret not configured; skipping tap bump." \
                 "Add a repo-scoped PAT with write access to tsotchke/homebrew-eshkol to enable it."
            exit 0
          fi

          case "$RELEASE_TAG" in
            *alpha*|*beta*|*rc*)
              echo "::notice::Prerelease tag $RELEASE_TAG; not bumping the tap."
              exit 0;;
          esac

          tag="$RELEASE_TAG"
          tarball_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"

          # GitHub source archives are generated on demand; fetch and hash.
          curl -fsSL -o /tmp/src.tar.gz "$tarball_url"
          sha="$(sha256sum /tmp/src.tar.gz | awk '{print $1}')"
          echo "tag=$tag sha256=$sha"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/tsotchke/homebrew-eshkol.git" /tmp/tap
          cd /tmp/tap

          formula=Formula/eshkol.rb
          sed -i -E "s|url \"https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/[^\"]+\"|url \"${tarball_url}\"|" "$formula"
          sed -i -E "s|sha256 \"[0-9a-f]{64}\"|sha256 \"${sha}\"|" "$formula"

          if git diff --quiet; then
            echo "::notice::Formula already at ${tag}; nothing to do."
            exit 0
          fi

          # Sanity: the new url and sha must both be present.
          grep -q "$tarball_url" "$formula"
          grep -q "$sha" "$formula"

          git -c user.name=tsotchke -c user.email=tsotchkele@gmail.com \
              commit -am "eshkol ${tag}"
          git push origin HEAD
