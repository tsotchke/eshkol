name: CI

on:
  push:
    branches: [master, develop, 'feat/**']
    # Docs/markdown-only changes cannot affect the build or tests, so they must
    # not spin up the full compile/test/wasm/asan matrix. Research ADRs and
    # documentation live under docs/ and **/*.md; skip CI when a change touches
    # only those. A change that also touches code still runs the full matrix.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'notes/**'
      - 'press/**'
      - 'LICENSE'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'notes/**'
      - 'press/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Master is the public release gate. Let those runs finish so we get a
  # complete matrix signal even while follow-up commits are landing.
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  LLVM_MAJOR: '21'
  WINDOWS_LLVM_SDK_VERSION: '21.1.8'
  CUDA_VERSION: '12.4.1'
  CUDA_PACKAGE_SERIES: '12-4'

jobs:
  # Moonlab is deliberately opt-in, so keep its networked macOS coverage in a
  # separate advisory job. `continue-on-error` makes the lane informative
  # without turning the default required CI set into a Moonlab availability
  # gate; branch-protection configuration must not add this check as required.
  quantum-macos:
    name: quantum-macos (advisory)
    runs-on: macos-14
    continue-on-error: true
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          brew install llvm@${LLVM_MAJOR} cmake ninja readline pcre2 sqlite

      - name: Configure quantum build
        shell: bash
        run: |
          set -euxo pipefail
          LLVM_PREFIX="$(brew --prefix llvm@${LLVM_MAJOR})"
          export PATH="$LLVM_PREFIX/bin:$PATH"
          cmake -S . -B build-quantum -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DESHKOL_REQUIRED_LLVM_MAJOR="${LLVM_MAJOR}" \
            -DLLVM_CONFIG_EXECUTABLE="$LLVM_PREFIX/bin/llvm-config" \
            -DESHKOL_QUANTUM_ENABLED=ON \
            -DESHKOL_BUILD_TESTS=ON \
            -DESHKOL_BUILD_AGENT_FFI=ON

      - name: Build quantum runtime and test tools
        shell: bash
        run: |
          set -euxo pipefail
          cmake --build build-quantum --parallel

      - name: Run quantum integration gates
        shell: bash
        env:
          ESHKOL_LANGUAGE_COVERAGE_TRACE_DIR: ${{ runner.temp }}/eshkol-language-coverage/quantum
        run: |
          set -euo pipefail
          mkdir -p "$ESHKOL_LANGUAGE_COVERAGE_TRACE_DIR"
          runner="$PWD/build-quantum/eshkol-run"
          libflag="-L$PWD/build-quantum"
          for test in tests/quantum/*.esk; do
            echo "== $test =="
            output="$($runner -r "$test" "$libflag" 2>&1)"
            printf '%s\n' "$output"
            case "$(basename "$test")" in
              quantum_smoke_test.esk)
                grep -q 'Bell-pair correlation over 200 shots: 200/200  PASS' <<<"$output"
                grep -q 'quantum_smoke_test: PASS' <<<"$output"
                ;;
              vqe_test.esk)
                grep -q 'VQE H2: PASS' <<<"$output"
                ;;
              vqe_ad_test.esk)
                grep -q 'vqe_ad_test: PASS (3/3)' <<<"$output"
                ;;
              pqc_mlkem_test.esk)
                grep -q 'pqc_mlkem_test: PASS (9/9)' <<<"$output"
                ;;
              bell_chsh_test.esk)
                grep -q 'bell_chsh_test: PASS' <<<"$output"
                ;;
              quantum_surface_coverage_test.esk)
                grep -q 'quantum_surface_coverage_test: PASS (3/3)' <<<"$output"
                ;;
              vqe_ad_adversarial.esk)
                grep -q 'vqe_ad_adversarial: PASS' <<<"$output"
                ;;
              *)
                echo "Unhandled quantum test: $test" >&2
                exit 1
                ;;
            esac
          done

          # `-r` resolves Moonlab from the already-linked compiler process.
          # Compile and execute one representative standalone binary as well,
          # so CI proves that the generated AOT link closure and loader rpath
          # carry Moonlab without an agent-FFI require or ambient DYLD paths.
          aot_dir="${RUNNER_TEMP}/eshkol-quantum-aot"
          aot_bin="${aot_dir}/quantum-smoke${{ runner.os == 'Windows' && '.exe' || '' }}"
          mkdir -p "$aot_dir"
          "$runner" tests/quantum/quantum_smoke_test.esk -o "$aot_bin" "$libflag"
          aot_output="$("$aot_bin" 2>&1)"
          printf '%s\n' "$aot_output"
          grep -q 'Bell-pair correlation over 200 shots: 200/200  PASS' <<<"$aot_output"
          grep -q 'quantum_smoke_test: PASS' <<<"$aot_output"

      # The default AD oracle remains Moonlab-free. This opt-in invocation
      # enables its VQE-energy AD-vs-finite-difference probe on the same
      # quantum build that compiled the agent.quantum bridge.
      - name: Run quantum AD adversarial probe
        shell: bash
        env:
          BUILD_DIR: build-quantum
          ESHKOL_QUANTUM_ENABLED: 'ON'
          ESHKOL_LANGUAGE_COVERAGE_TRACE_DIR: ${{ runner.temp }}/eshkol-language-coverage/quantum
        run: |
          set -euxo pipefail
          ./scripts/run_ad_adversarial.sh --quick

      # This advisory lane owns the complete executable-language oracle: the
      # quantum build can execute both the ordinary deterministic corpus and
      # the opt-in Moonlab/PQC corpus in one environment, then aggregate fresh
      # per-process traces. No checked-in/token-only evidence is accepted.
      - name: Run complete traced core corpus
        shell: bash
        env:
          BUILD_DIR: build-quantum
          ESHKOL_LANGUAGE_COVERAGE_TRACE_DIR: ${{ runner.temp }}/eshkol-language-coverage/core
        run: |
          set -euxo pipefail
          mkdir -p "$ESHKOL_LANGUAGE_COVERAGE_TRACE_DIR"
          ./scripts/run_all_tests.sh

      - name: Enforce 100 percent executable language coverage
        shell: bash
        env:
          BUILD_DIR: build-quantum
          LANGUAGE_COVERAGE_RUNTIME_TRACE_DIRS: ${{ runner.temp }}/eshkol-language-coverage/core:${{ runner.temp }}/eshkol-language-coverage/quantum
          LANGUAGE_COVERAGE_TRACE: ${{ runner.temp }}/eshkol-language-coverage/language_surface_coverage.jsonl
        run: |
          set -euxo pipefail
          ./scripts/run_language_coverage.sh \
            --json "${{ runner.temp }}/eshkol-language-coverage/coverage_run.json"

      - name: Upload executable language-coverage evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-language-coverage
          path: ${{ runner.temp }}/eshkol-language-coverage
          if-no-files-found: error

  unix-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-lite
            runner: ubuntu-22.04
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-linux-x64
          - name: linux-arm64-lite
            runner: ubuntu-22.04-arm
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-linux-arm64
          - name: linux-x64-xla
            runner: ubuntu-22.04
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: linux-arm64-xla
            runner: ubuntu-22.04-arm
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: linux-x64-cuda
            runner: ubuntu-22.04
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_command: ./scripts/run_gpu_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: linux-arm64-cuda
            runner: ubuntu-22.04-arm
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_command: ./scripts/run_gpu_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: macos-arm64-lite
            runner: macos-14
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-macos-arm64
          - name: macos-x64-lite
            runner: macos-15-intel
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-macos-x64
          - name: macos-arm64-xla
            runner: macos-14
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: macos-x64-xla
            runner: macos-15-intel
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          # Sanitizer lanes (per v1.2 release audit, blocker #10).
          # ASan and UBSan are compatible together; both run the v1.2
          # edge-case suite which is the most likely place to surface
          # memory-safety / UB regressions.  TSan and MSan are deferred
          # — TSan needs LLVM-21-built-with-tsan-runtime which the
          # apt.llvm.org packages don't ship; MSan needs an MSan-built
          # libstdc++ which is even more involved.
          - name: linux-x64-asan-ubsan
            runner: ubuntu-22.04
            build_dir: build-asan
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            sanitizer_flags: '-DESHKOL_ENABLE_ASAN=ON -DESHKOL_ENABLE_UBSAN=ON'
            test_command: ./scripts/run_v1_2_edge_cases_tests.sh
            upload_artifact: 'false'
            artifact_name: ''

    steps:
      - uses: actions/checkout@v6

      - name: Add LLVM Repository (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          apt_update() {
            for attempt in 1 2 3; do
              if sudo apt-get update -o Acquire::Retries=5; then
                return 0
              fi
              sudo rm -rf /var/lib/apt/lists/*
              sleep $((attempt * 15))
            done
            sudo apt-get update -o Acquire::Retries=5
          }
          apt_update

      - name: Add NVIDIA CUDA Repository (Linux CUDA)
        if: runner.os == 'Linux' && matrix.gpu_enabled == 'ON'
        shell: bash
        run: |
          set -euxo pipefail
          case "$(uname -m)" in
            x86_64) cuda_repo_arch=x86_64 ;;
            aarch64) cuda_repo_arch=sbsa ;;
            *) echo "Unsupported native CUDA architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          keyring="$RUNNER_TEMP/cuda-keyring.deb"
          wget -O "$keyring" \
            "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/${cuda_repo_arch}/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i "$keyring"
          sudo apt-get update -o Acquire::Retries=5

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-${LLVM_MAJOR} llvm-${LLVM_MAJOR}-dev lld-${LLVM_MAJOR} \
            libreadline-dev pkg-config \
            libssl-dev libncurses-dev \
            libpcre2-dev libsqlite3-dev \
            libpng-dev libjpeg-dev libwebp-dev \
            git python3
          if [[ "${{ matrix.gpu_enabled }}" == "ON" ]]; then
            sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y \
              -o Acquire::Retries=5 \
              "cuda-nvcc-${CUDA_PACKAGE_SERIES}" \
              "cuda-cudart-dev-${CUDA_PACKAGE_SERIES}" \
              "libcublas-dev-${CUDA_PACKAGE_SERIES}"
            echo "/usr/local/cuda-12.4/bin" >> "$GITHUB_PATH"
            echo "CUDAToolkit_ROOT=/usr/local/cuda-12.4" >> "$GITHUB_ENV"
            echo "LD_LIBRARY_PATH=/usr/local/cuda-12.4/lib64${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
            /usr/local/cuda-12.4/bin/nvcc --version
          fi
          # eshkol's codegen passes -fuse-ld=lld for AArch64 Linux
          # (GNU ld 2.38 hits range/erratum bugs on the big static
          # runtime; see lib/backend/llvm_codegen.cpp). The
          # lld-${LLVM_MAJOR} package installs `ld.lld-${LLVM_MAJOR}`
          # but `-fuse-ld=lld` looks for unversioned `ld.lld` in PATH.
          sudo ln -sf "/usr/bin/ld.lld-${LLVM_MAJOR}" /usr/bin/ld.lld
          ld.lld --version

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install llvm@${LLVM_MAJOR} cmake ninja readline pcre2 sqlite

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          BUILD_DIR="${{ matrix.build_dir }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LLVM_PREFIX="$(brew --prefix llvm@${LLVM_MAJOR})"
            export PATH="$LLVM_PREFIX/bin:$PATH"
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config"
          else
            LLVM_CONFIG="/usr/bin/llvm-config-${LLVM_MAJOR}"
          fi

          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DESHKOL_REQUIRED_LLVM_MAJOR="${LLVM_MAJOR}" \
            -DLLVM_CONFIG_EXECUTABLE="$LLVM_CONFIG" \
            -DESHKOL_XLA_ENABLED=${{ matrix.xla_enabled }} \
            -DESHKOL_GPU_ENABLED=${{ matrix.gpu_enabled }} \
            -DESHKOL_REQUIRE_GPU_BACKEND=${{ matrix.gpu_enabled }} \
            -DCUDAToolkit_ROOT=/usr/local/cuda-12.4 \
            ${{ matrix.sanitizer_flags }}

      - name: Verify real CUDA build graph
        if: matrix.gpu_enabled == 'ON'
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/verify_gpu_backend.py \
            --build-dir "${{ matrix.build_dir }}" \
            --expected CUDA

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.sanitizer_flags }}" == *"ESHKOL_ENABLE_ASAN=ON"* ]]; then
            export ASAN_OPTIONS="${ASAN_OPTIONS:-detect_leaks=0:halt_on_error=1:allocator_may_return_null=1}"
            export UBSAN_OPTIONS="${UBSAN_OPTIONS:-halt_on_error=1:print_stacktrace=1}"
          fi
          cmake --build "${{ matrix.build_dir }}" --parallel

      # Catches the failure mode where a new C runtime helper
      # (eshkol_intern_symbol_lookup, region_create, …) is added on the
      # host side and the codegen emits a WASM `env` import for it, but
      # the JS glue (web/eshkol-repl.js + site/static/eshkol-runtime.js)
      # is never updated — the website then fails with `function import
      # requires a callable` at WebAssembly.instantiate().  Compiles a
      # tiny smoke set, parses each .wasm import section, diffs against
      # the JS env keys.  Skipped on the GPU/XLA/sanitizer lanes — those
      # don't change the WASM-side surface and their ASan instrumentation
      # confuses the wasm32 codegen path.
      - name: Check WASM env imports
        if: matrix.xla_enabled == 'OFF' && matrix.gpu_enabled == 'OFF' && matrix.build_dir == 'build'
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          python3 scripts/check_wasm_imports.py --build-dir "$BUILD_DIR"

      # Guards the stdlib dead-strip on the --wasm path (issue #240 follow-up):
      # a stdlib-using program compiled WITHOUT --no-stdlib must dead-strip the
      # unused stdlib and stay small + instantiable, rather than pinning the
      # whole stdlib against DCE via the homoiconic display registry.
      - name: Check WASM stdlib dead-strip size
        if: matrix.xla_enabled == 'OFF' && matrix.gpu_enabled == 'OFF' && matrix.build_dir == 'build'
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          python3 scripts/check_wasm_size.py --build-dir "$BUILD_DIR"

      - name: Run Tests
        timeout-minutes: 120
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/eshkol-test-logs"
          export ESHKOL_HTTP_SERVER_SMOKE_TIMEOUT="${ESHKOL_HTTP_SERVER_SMOKE_TIMEOUT:-600}"
          export ESHKOL_REPL_MACHINE_READY_TIMEOUT="${ESHKOL_REPL_MACHINE_READY_TIMEOUT:-600}"
          export ESHKOL_REPL_MACHINE_DONE_TIMEOUT="${ESHKOL_REPL_MACHINE_DONE_TIMEOUT:-180}"
          export ESHKOL_EDGE_FAILURE_LINES="${ESHKOL_EDGE_FAILURE_LINES:-80}"
          if [[ "${{ matrix.sanitizer_flags }}" == *"ESHKOL_ENABLE_ASAN=ON"* ]]; then
            # The sanitizer lane is for address/UB regressions. Leak
            # detection turns arena/JIT lifetime caches into false
            # process-exit failures and hides the actionable signal.
            export ASAN_OPTIONS="${ASAN_OPTIONS:-detect_leaks=0:halt_on_error=1:allocator_may_return_null=1}"
            export UBSAN_OPTIONS="${UBSAN_OPTIONS:-halt_on_error=1:print_stacktrace=1}"
          fi
          ${{ matrix.test_command }} 2>&1 | tee "$RUNNER_TEMP/eshkol-test-logs/${{ matrix.name }}.log"
          test -x "${{ matrix.build_dir }}/eshkol-agent-http-test"
          "${{ matrix.build_dir }}/eshkol-agent-http-test"
          test -x "${{ matrix.build_dir }}/eshkol-agent-sse-test"
          "${{ matrix.build_dir }}/eshkol-agent-sse-test"
          test -x "${{ matrix.build_dir }}/eshkol-agent-capabilities-test"
          "${{ matrix.build_dir }}/eshkol-agent-capabilities-test"

      - name: Upload Test Logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-test-log
          path: ${{ runner.temp }}/eshkol-test-logs/${{ matrix.name }}.log
          if-no-files-found: ignore

      - name: Upload Artifacts
        if: matrix.upload_artifact == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.build_dir }}/eshkol-run
            ${{ matrix.build_dir }}/eshkol-repl
            ${{ matrix.build_dir }}/stdlib.o
            ${{ matrix.build_dir }}/stdlib.bc

  windows-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # Native Windows ARM64 covers the portable lite/XLA compiler. NVIDIA
          # ships the Windows CUDA toolkit only for x86_64, so CUDA compilation
          # is a separate hosted x64 lane below.
          - name: windows-arm64-lite
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_mode: windows-lite
            upload_artifact: 'true'
            artifact_name: eshkol-windows-arm64
          - name: windows-arm64-xla
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_mode: xla
            upload_artifact: 'false'
            artifact_name: ''
          - name: windows-x64-cuda
            runner: windows-2022
            arch: x64
            llvm_suffix: x86_64
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_mode: gpu
            upload_artifact: 'false'
            artifact_name: ''
    steps:
      - uses: actions/checkout@v6

      - name: Install NVIDIA CUDA Toolkit (Windows x64 CUDA)
        if: matrix.gpu_enabled == 'ON'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          sub-packages: '["crt", "cudart", "cublas", "cublas_dev", "nvcc", "nvvm", "visual_studio_integration"]'
          log-file-suffix: ci-${{ matrix.name }}

      - name: Restore LLVM SDK Cache
        id: llvm-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\src\clang+llvm-${{ env.WINDOWS_LLVM_SDK_VERSION }}-${{ matrix.llvm_suffix }}-pc-windows-msvc
          key: windows-llvm-sdk-${{ matrix.arch }}-${{ env.WINDOWS_LLVM_SDK_VERSION }}

      - name: Install LLVM SDK
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmVersion = '${{ env.WINDOWS_LLVM_SDK_VERSION }}'
          $llvmRoot    = "C:\src\clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc"
          $llvmCmakeDir = "$llvmRoot\lib\cmake\llvm"
          $archive = "$env:RUNNER_TEMP\llvm-${{ matrix.arch }}-$llvmVersion.tar.xz"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc.tar.xz"

          New-Item -ItemType Directory -Force -Path 'C:\src' | Out-Null
          if (Test-Path $llvmRoot) {
            Remove-Item -LiteralPath $llvmRoot -Recurse -Force
          }

          Write-Host "Downloading $url"
          curl.exe --fail --location --retry 5 --retry-delay 5 --retry-all-errors --output $archive $url
          if ($LASTEXITCODE -ne 0) { throw "curl download failed (exit $LASTEXITCODE)" }

          Write-Host "Extracting..."
          tar -xf $archive -C C:\src
          if ($LASTEXITCODE -ne 0) { throw "tar extraction failed (exit $LASTEXITCODE)" }

          if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
            throw "LLVMConfig.cmake not found at $llvmCmakeDir - extraction may have failed"
          }

          Write-Host "LLVM $llvmVersion ${{ matrix.arch }} ready at $llvmRoot"

      - name: Resolve LLVM SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmVersion = '${{ env.WINDOWS_LLVM_SDK_VERSION }}'
          $llvmRoot    = "C:\src\clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc"
          $llvmCmakeDir = "$llvmRoot\lib\cmake\llvm"

          if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
            throw "LLVMConfig.cmake not found at $llvmCmakeDir - extraction may have failed"
          }

          Write-Host "LLVM $llvmVersion ${{ matrix.arch }} ready at $llvmRoot"
          "LLVM_DIR=$llvmCmakeDir"   | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append
          "LLVM_HOME=$llvmRoot"       | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append
          "$llvmRoot\bin"             | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Save LLVM SDK Cache
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\src\clang+llvm-${{ env.WINDOWS_LLVM_SDK_VERSION }}-${{ matrix.llvm_suffix }}-pc-windows-msvc
          key: windows-llvm-sdk-${{ matrix.arch }}-${{ env.WINDOWS_LLVM_SDK_VERSION }}

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $platform = if ('${{ matrix.arch }}' -eq 'arm64') { 'ARM64' } else { 'x64' }
          $hostCxx = "$env:LLVM_HOME\bin\clang++.exe"
          if (-not (Test-Path $hostCxx)) {
            throw "clang++.exe not found in LLVM SDK at $hostCxx"
          }
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found; cannot locate a Visual Studio generator"
          }
          $cmakeHelp = (cmake --help) -join "`n"
          $generator = $null
          foreach ($candidate in @(
              @{ name = 'Visual Studio 18 2026'; version = '[18.0,19.0)' },
              @{ name = 'Visual Studio 17 2022'; version = '[17.0,18.0)' }
            )) {
            if ($cmakeHelp -notmatch [regex]::Escape($candidate.name)) {
              continue
            }
            $install = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -version $candidate.version -property installationPath
            if ($LASTEXITCODE -eq 0 -and $install) {
              $generator = $candidate.name
              Write-Host "Using CMake generator '$generator' from $install"
              break
            }
          }
          if (-not $generator) {
            throw "No supported Visual Studio CMake generator found. Install VS 2022+ with MSBuild, or update the generator candidate list."
          }
          $cudaArgs = @()
          $toolset = 'ClangCL'
          if ('${{ matrix.gpu_enabled }}' -eq 'ON') {
            if (-not $env:CUDA_PATH -or -not (Test-Path "$env:CUDA_PATH\bin\nvcc.exe")) {
              throw "CUDA toolkit action did not provide a usable CUDA_PATH"
            }
            $cudaArgs += "-DCUDAToolkit_ROOT=$env:CUDA_PATH"
            $toolset = "ClangCL,cuda=$env:CUDA_PATH"
          }
          cmake -S . -B '${{ matrix.build_dir }}' `
            -G $generator `
            -A $platform `
            -T $toolset `
            -DBUILD_REPL=ON `
            -DESHKOL_BUILD_TESTS=OFF `
            -DESHKOL_REQUIRED_LLVM_MAJOR=${{ env.LLVM_MAJOR }} `
            -DESHKOL_HOST_CXX_COMPILER="$hostCxx" `
            -DESHKOL_XLA_ENABLED=${{ matrix.xla_enabled }} `
            -DESHKOL_GPU_ENABLED=${{ matrix.gpu_enabled }} `
            -DESHKOL_REQUIRE_GPU_BACKEND=${{ matrix.gpu_enabled }} `
            -DLLVM_DIR="$env:LLVM_DIR" `
            @cudaArgs

      - name: Verify real CUDA build graph
        if: matrix.gpu_enabled == 'ON'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:CUDA_PATH\bin\nvcc.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "nvcc version probe failed" }
          python scripts/verify_gpu_backend.py `
            --build-dir '${{ matrix.build_dir }}' `
            --expected CUDA

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $targets = @('eshkol-run', 'eshkol-repl', 'eshkol-agent-ffi', 'eshkol-windows-agent-test', 'eshkol-agent-http-test', 'eshkol-agent-sse-test', 'eshkol-agent-capabilities-test')
          if ('${{ matrix.test_mode }}' -eq 'xla') {
            $targets += 'xla_codegen_test'
          }
          cmake --build '${{ matrix.build_dir }}' --config Release --target @($targets) --parallel

      - name: Run Tests
        timeout-minutes: 120
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\eshkol-test-logs" | Out-Null
          & .\scripts\run_all_tests.ps1 -BuildDir ".\${{ matrix.build_dir }}" -SkipConfigureBuild -Mode '${{ matrix.test_mode }}' *>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\eshkol-test-logs\${{ matrix.name }}.log"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          $agentNativeTest = Join-Path '${{ matrix.build_dir }}' 'Release\eshkol-windows-agent-test.exe'
          $agentHttpTest = Join-Path '${{ matrix.build_dir }}' 'Release\eshkol-agent-http-test.exe'
          $agentSseTest = Join-Path '${{ matrix.build_dir }}' 'Release\eshkol-agent-sse-test.exe'
          $agentCapabilitiesTest = Join-Path '${{ matrix.build_dir }}' 'Release\eshkol-agent-capabilities-test.exe'
          foreach ($test in @($agentNativeTest, $agentHttpTest, $agentSseTest, $agentCapabilitiesTest)) {
            if (-not (Test-Path $test -PathType Leaf)) {
              throw "Required native agent contract test is missing: $test"
            }
            & $test
            if ($LASTEXITCODE -ne 0) {
              throw "Native agent contract test failed: $test (exit $LASTEXITCODE)"
            }
          }

      - name: Upload Test Logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-test-log
          path: ${{ runner.temp }}/eshkol-test-logs/${{ matrix.name }}.log
          if-no-files-found: ignore

      - name: Upload Artifacts
        if: matrix.upload_artifact == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.build_dir }}/Release/eshkol-run.exe
            ${{ matrix.build_dir }}/Release/eshkol-repl.exe
            ${{ matrix.build_dir }}/stdlib.o
            ${{ matrix.build_dir }}/stdlib.bc
