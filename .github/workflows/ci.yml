name: CI

on:
  push:
    branches: [master, develop, 'feat/**']
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM 17 Repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update

      - name: Install Dependencies
        run: |
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-17 llvm-17-dev \
            libreadline-dev pkg-config \
            libssl-dev libncurses-dev
          sudo ln -sf /usr/bin/llvm-config-17 /usr/bin/llvm-config

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --parallel

      - name: Run All Tests
        run: ./scripts/run_all_tests.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: matrix.build_type == 'Release'
        with:
          name: eshkol-linux-x64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM 17 Repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update

      - name: Install Dependencies
        run: |
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-17 llvm-17-dev \
            libreadline-dev pkg-config \
            libssl-dev libncurses-dev
          sudo ln -sf /usr/bin/llvm-config-17 /usr/bin/llvm-config

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run All Tests
        run: ./scripts/run_all_tests.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-linux-arm64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o

  build-macos-arm:
    runs-on: macos-14
    env:
      PATH: /opt/homebrew/opt/llvm@17/bin:/usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install llvm@17 cmake ninja readline

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Run All Tests
        run: ./scripts/run_all_tests.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-macos-arm64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o

  build-macos-intel:
    runs-on: macos-15-large
    env:
      PATH: /usr/local/opt/llvm@17/bin:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install llvm@17 cmake ninja readline

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Run All Tests
        run: ./scripts/run_all_tests.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-macos-x64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o
