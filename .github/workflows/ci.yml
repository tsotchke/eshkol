name: CI

on:
  push:
    branches: [master, develop, 'feat/**']
    # Docs/markdown-only changes cannot affect the build or tests, so they must
    # not spin up the full compile/test/wasm/asan matrix. Research ADRs and
    # documentation live under docs/ and **/*.md; skip CI when a change touches
    # only those. A change that also touches code still runs the full matrix.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'notes/**'
      - 'press/**'
      - 'LICENSE'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'notes/**'
      - 'press/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Master is the public release gate. Let those runs finish so we get a
  # complete matrix signal even while follow-up commits are landing.
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  LLVM_MAJOR: '21'
  WINDOWS_LLVM_SDK_VERSION: '21.1.8'

jobs:
  unix-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-lite
            runner: ubuntu-22.04
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-linux-x64
          - name: linux-arm64-lite
            runner: ubuntu-22.04-arm
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-linux-arm64
          - name: linux-x64-xla
            runner: ubuntu-22.04
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: linux-arm64-xla
            runner: ubuntu-22.04-arm
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: linux-x64-cuda
            runner: ubuntu-22.04
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_command: ./scripts/run_gpu_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: linux-arm64-cuda
            runner: ubuntu-22.04-arm
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_command: ./scripts/run_gpu_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: macos-arm64-lite
            runner: macos-14
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-macos-arm64
          - name: macos-x64-lite
            runner: macos-15-intel
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_all_tests.sh
            upload_artifact: 'true'
            artifact_name: eshkol-macos-x64
          - name: macos-arm64-xla
            runner: macos-14
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          - name: macos-x64-xla
            runner: macos-15-intel
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_command: ./scripts/run_xla_tests.sh
            upload_artifact: 'false'
            artifact_name: ''
          # Sanitizer lanes (per v1.2 release audit, blocker #10).
          # ASan and UBSan are compatible together; both run the v1.2
          # edge-case suite which is the most likely place to surface
          # memory-safety / UB regressions.  TSan and MSan are deferred
          # — TSan needs LLVM-21-built-with-tsan-runtime which the
          # apt.llvm.org packages don't ship; MSan needs an MSan-built
          # libstdc++ which is even more involved.
          - name: linux-x64-asan-ubsan
            runner: ubuntu-22.04
            build_dir: build-asan
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            sanitizer_flags: '-DESHKOL_ENABLE_ASAN=ON -DESHKOL_ENABLE_UBSAN=ON'
            test_command: ./scripts/run_v1_2_edge_cases_tests.sh
            upload_artifact: 'false'
            artifact_name: ''

    steps:
      - uses: actions/checkout@v6

      - name: Add LLVM Repository (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          apt_update() {
            for attempt in 1 2 3; do
              if sudo apt-get update -o Acquire::Retries=5; then
                return 0
              fi
              sudo rm -rf /var/lib/apt/lists/*
              sleep $((attempt * 15))
            done
            sudo apt-get update -o Acquire::Retries=5
          }
          apt_update

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-${LLVM_MAJOR} llvm-${LLVM_MAJOR}-dev lld-${LLVM_MAJOR} \
            libreadline-dev pkg-config \
            libssl-dev libncurses-dev \
            libpcre2-dev libsqlite3-dev \
            libpng-dev libjpeg-dev libwebp-dev \
            git python3
          # eshkol's codegen passes -fuse-ld=lld for AArch64 Linux
          # (GNU ld 2.38 hits range/erratum bugs on the big static
          # runtime; see lib/backend/llvm_codegen.cpp). The
          # lld-${LLVM_MAJOR} package installs `ld.lld-${LLVM_MAJOR}`
          # but `-fuse-ld=lld` looks for unversioned `ld.lld` in PATH.
          sudo ln -sf "/usr/bin/ld.lld-${LLVM_MAJOR}" /usr/bin/ld.lld
          ld.lld --version

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install llvm@${LLVM_MAJOR} cmake ninja readline pcre2 sqlite

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          BUILD_DIR="${{ matrix.build_dir }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            LLVM_PREFIX="$(brew --prefix llvm@${LLVM_MAJOR})"
            export PATH="$LLVM_PREFIX/bin:$PATH"
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config"
          else
            LLVM_CONFIG="/usr/bin/llvm-config-${LLVM_MAJOR}"
          fi

          cmake -S . -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DESHKOL_REQUIRED_LLVM_MAJOR="${LLVM_MAJOR}" \
            -DLLVM_CONFIG_EXECUTABLE="$LLVM_CONFIG" \
            -DESHKOL_XLA_ENABLED=${{ matrix.xla_enabled }} \
            -DESHKOL_GPU_ENABLED=${{ matrix.gpu_enabled }} \
            ${{ matrix.sanitizer_flags }}

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.sanitizer_flags }}" == *"ESHKOL_ENABLE_ASAN=ON"* ]]; then
            export ASAN_OPTIONS="${ASAN_OPTIONS:-detect_leaks=0:halt_on_error=1:allocator_may_return_null=1}"
            export UBSAN_OPTIONS="${UBSAN_OPTIONS:-halt_on_error=1:print_stacktrace=1}"
          fi
          cmake --build "${{ matrix.build_dir }}" --parallel

      # Catches the failure mode where a new C runtime helper
      # (eshkol_intern_symbol_lookup, region_create, …) is added on the
      # host side and the codegen emits a WASM `env` import for it, but
      # the JS glue (web/eshkol-repl.js + site/static/eshkol-runtime.js)
      # is never updated — the website then fails with `function import
      # requires a callable` at WebAssembly.instantiate().  Compiles a
      # tiny smoke set, parses each .wasm import section, diffs against
      # the JS env keys.  Skipped on the GPU/XLA/sanitizer lanes — those
      # don't change the WASM-side surface and their ASan instrumentation
      # confuses the wasm32 codegen path.
      - name: Check WASM env imports
        if: matrix.xla_enabled == 'OFF' && matrix.gpu_enabled == 'OFF' && matrix.build_dir == 'build'
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          python3 scripts/check_wasm_imports.py --build-dir "$BUILD_DIR"

      - name: Run Tests
        timeout-minutes: 120
        shell: bash
        env:
          BUILD_DIR: ${{ matrix.build_dir }}
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/eshkol-test-logs"
          export ESHKOL_HTTP_SERVER_SMOKE_TIMEOUT="${ESHKOL_HTTP_SERVER_SMOKE_TIMEOUT:-600}"
          export ESHKOL_REPL_MACHINE_READY_TIMEOUT="${ESHKOL_REPL_MACHINE_READY_TIMEOUT:-600}"
          export ESHKOL_REPL_MACHINE_DONE_TIMEOUT="${ESHKOL_REPL_MACHINE_DONE_TIMEOUT:-180}"
          export ESHKOL_EDGE_FAILURE_LINES="${ESHKOL_EDGE_FAILURE_LINES:-80}"
          if [[ "${{ matrix.sanitizer_flags }}" == *"ESHKOL_ENABLE_ASAN=ON"* ]]; then
            # The sanitizer lane is for address/UB regressions. Leak
            # detection turns arena/JIT lifetime caches into false
            # process-exit failures and hides the actionable signal.
            export ASAN_OPTIONS="${ASAN_OPTIONS:-detect_leaks=0:halt_on_error=1:allocator_may_return_null=1}"
            export UBSAN_OPTIONS="${UBSAN_OPTIONS:-halt_on_error=1:print_stacktrace=1}"
          fi
          ${{ matrix.test_command }} 2>&1 | tee "$RUNNER_TEMP/eshkol-test-logs/${{ matrix.name }}.log"

      - name: Upload Test Logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-test-log
          path: ${{ runner.temp }}/eshkol-test-logs/${{ matrix.name }}.log
          if-no-files-found: ignore

      - name: Upload Artifacts
        if: matrix.upload_artifact == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.build_dir }}/eshkol-run
            ${{ matrix.build_dir }}/eshkol-repl
            ${{ matrix.build_dir }}/stdlib.o
            ${{ matrix.build_dir }}/stdlib.bc

  windows-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # Windows x86_64 is validated on Jack's local Windows machine via
          # scripts/remote_windows_verify.sh --suite-only to avoid routine
          # hosted runner use. Release packaging still builds hosted x64.
          - name: windows-arm64-lite
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build
            xla_enabled: 'OFF'
            gpu_enabled: 'OFF'
            test_mode: windows-lite
            upload_artifact: 'true'
            artifact_name: eshkol-windows-arm64
          - name: windows-arm64-xla
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build-xla
            xla_enabled: 'ON'
            gpu_enabled: 'OFF'
            test_mode: xla
            upload_artifact: 'false'
            artifact_name: ''
          - name: windows-arm64-cuda
            runner: windows-11-arm
            arch: arm64
            llvm_suffix: aarch64
            build_dir: build-cuda
            xla_enabled: 'OFF'
            gpu_enabled: 'ON'
            test_mode: gpu
            upload_artifact: 'false'
            artifact_name: ''
    steps:
      - uses: actions/checkout@v6

      - name: Restore LLVM SDK Cache
        id: llvm-cache
        uses: actions/cache/restore@v5
        with:
          path: C:\src\clang+llvm-${{ env.WINDOWS_LLVM_SDK_VERSION }}-${{ matrix.llvm_suffix }}-pc-windows-msvc
          key: windows-llvm-sdk-${{ matrix.arch }}-${{ env.WINDOWS_LLVM_SDK_VERSION }}

      - name: Install LLVM SDK
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmVersion = '${{ env.WINDOWS_LLVM_SDK_VERSION }}'
          $llvmRoot    = "C:\src\clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc"
          $llvmCmakeDir = "$llvmRoot\lib\cmake\llvm"
          $archive = "$env:RUNNER_TEMP\llvm-${{ matrix.arch }}-$llvmVersion.tar.xz"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc.tar.xz"

          New-Item -ItemType Directory -Force -Path 'C:\src' | Out-Null
          if (Test-Path $llvmRoot) {
            Remove-Item -LiteralPath $llvmRoot -Recurse -Force
          }

          Write-Host "Downloading $url"
          curl.exe --fail --location --retry 5 --retry-delay 5 --retry-all-errors --output $archive $url
          if ($LASTEXITCODE -ne 0) { throw "curl download failed (exit $LASTEXITCODE)" }

          Write-Host "Extracting..."
          tar -xf $archive -C C:\src
          if ($LASTEXITCODE -ne 0) { throw "tar extraction failed (exit $LASTEXITCODE)" }

          if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
            throw "LLVMConfig.cmake not found at $llvmCmakeDir - extraction may have failed"
          }

          Write-Host "LLVM $llvmVersion ${{ matrix.arch }} ready at $llvmRoot"

      - name: Resolve LLVM SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $llvmVersion = '${{ env.WINDOWS_LLVM_SDK_VERSION }}'
          $llvmRoot    = "C:\src\clang+llvm-$llvmVersion-${{ matrix.llvm_suffix }}-pc-windows-msvc"
          $llvmCmakeDir = "$llvmRoot\lib\cmake\llvm"

          if (-not (Test-Path "$llvmCmakeDir\LLVMConfig.cmake")) {
            throw "LLVMConfig.cmake not found at $llvmCmakeDir - extraction may have failed"
          }

          Write-Host "LLVM $llvmVersion ${{ matrix.arch }} ready at $llvmRoot"
          "LLVM_DIR=$llvmCmakeDir"   | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append
          "LLVM_HOME=$llvmRoot"       | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append
          "$llvmRoot\bin"             | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Save LLVM SDK Cache
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: C:\src\clang+llvm-${{ env.WINDOWS_LLVM_SDK_VERSION }}-${{ matrix.llvm_suffix }}-pc-windows-msvc
          key: windows-llvm-sdk-${{ matrix.arch }}-${{ env.WINDOWS_LLVM_SDK_VERSION }}

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $platform = if ('${{ matrix.arch }}' -eq 'arm64') { 'ARM64' } else { 'x64' }
          $hostCxx = "$env:LLVM_HOME\bin\clang++.exe"
          if (-not (Test-Path $hostCxx)) {
            throw "clang++.exe not found in LLVM SDK at $hostCxx"
          }
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found; cannot locate a Visual Studio generator"
          }
          $cmakeHelp = (cmake --help) -join "`n"
          $generator = $null
          foreach ($candidate in @(
              @{ name = 'Visual Studio 18 2026'; version = '[18.0,19.0)' },
              @{ name = 'Visual Studio 17 2022'; version = '[17.0,18.0)' }
            )) {
            if ($cmakeHelp -notmatch [regex]::Escape($candidate.name)) {
              continue
            }
            $install = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -version $candidate.version -property installationPath
            if ($LASTEXITCODE -eq 0 -and $install) {
              $generator = $candidate.name
              Write-Host "Using CMake generator '$generator' from $install"
              break
            }
          }
          if (-not $generator) {
            throw "No supported Visual Studio CMake generator found. Install VS 2022+ with MSBuild, or update the generator candidate list."
          }
          cmake -S . -B '${{ matrix.build_dir }}' `
            -G $generator `
            -A $platform `
            -T ClangCL `
            -DBUILD_REPL=ON `
            -DESHKOL_BUILD_TESTS=OFF `
            -DESHKOL_REQUIRED_LLVM_MAJOR=${{ env.LLVM_MAJOR }} `
            -DESHKOL_HOST_CXX_COMPILER="$hostCxx" `
            -DESHKOL_XLA_ENABLED=${{ matrix.xla_enabled }} `
            -DESHKOL_GPU_ENABLED=${{ matrix.gpu_enabled }} `
            -DLLVM_DIR="$env:LLVM_DIR"

      - name: Build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $targets = @('eshkol-run', 'eshkol-repl')
          if ('${{ matrix.test_mode }}' -eq 'xla') {
            $targets += 'xla_codegen_test'
          }
          cmake --build '${{ matrix.build_dir }}' --config Release --target @($targets) --parallel

      - name: Run Tests
        timeout-minutes: 120
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\eshkol-test-logs" | Out-Null
          & .\scripts\run_all_tests.ps1 -BuildDir ".\${{ matrix.build_dir }}" -SkipConfigureBuild -Mode '${{ matrix.test_mode }}' *>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\eshkol-test-logs\${{ matrix.name }}.log"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload Test Logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-test-log
          path: ${{ runner.temp }}/eshkol-test-logs/${{ matrix.name }}.log
          if-no-files-found: ignore

      - name: Upload Artifacts
        if: matrix.upload_artifact == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.build_dir }}/Release/eshkol-run.exe
            ${{ matrix.build_dir }}/Release/eshkol-repl.exe
            ${{ matrix.build_dir }}/stdlib.o
            ${{ matrix.build_dir }}/stdlib.bc
