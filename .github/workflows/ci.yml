name: CI

on:
  push:
    branches: [master, devel, 'feat/**']
  pull_request:
    branches: [master, devel]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Add LLVM 17 Repository
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update

      - name: Install Dependencies
        run: |
          sudo apt-get install -y \
            cmake ninja-build \
            llvm-17 llvm-17-dev \
            libreadline-dev pkg-config
          sudo ln -sf /usr/bin/llvm-config-17 /usr/bin/llvm-config

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DESHKOL_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --parallel

      - name: Run Test Suite
        run: ctest --test-dir build --output-on-failure

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: matrix.build_type == 'Release'
        with:
          name: eshkol-linux-x64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o

  build-macos-arm:
    runs-on: macos-14
    env:
      PATH: /opt/homebrew/opt/llvm@17/bin:/usr/bin:/bin:/usr/sbin:/sbin:/opt/homebrew/bin
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install llvm@17 cmake ninja readline

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DESHKOL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Run Test Suite
        run: ctest --test-dir build --output-on-failure

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-macos-arm64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o

  build-macos-intel:
    runs-on: macos-15-large
    env:
      PATH: /usr/local/opt/llvm@17/bin:/usr/bin:/bin:/usr/sbin:/sbin:/usr/local/bin
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install llvm@17 cmake ninja readline

      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DESHKOL_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Run Test Suite
        run: ctest --test-dir build --output-on-failure

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-macos-x64
          path: |
            build/eshkol-run
            build/eshkol-repl
            build/stdlib.o

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-llvm
            mingw-w64-x86_64-readline

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DESHKOL_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run Test Suite
        run: ctest --test-dir build --output-on-failure

      - name: Stage Windows Artifacts
        run: |
          rm -rf dist/windows
          mkdir -p dist/windows
          cp build/eshkol-run.exe build/eshkol-repl.exe build/stdlib.o dist/windows/

          for dep in $(for exe in build/eshkol-run.exe build/eshkol-repl.exe; do
            ldd "$exe" | awk '/=> \/mingw64\/bin\// { print $3 }'
          done | sort -u); do
            cp "$dep" dist/windows/
          done

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eshkol-windows-x64
          path: dist/windows/
