<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eshkol — Mathematics as a First-Class Citizen</title>
  <meta name="description" content="Eshkol is a compiled programming language with compiler-integrated automatic differentiation, deterministic memory management, and heterogeneous computing. The first production language where calculus is a compiler primitive.">
  <meta property="og:title" content="Eshkol Programming Language">
  <meta property="og:description" content="Compiler-native automatic differentiation. Zero garbage collection. GPU acceleration. Cross-platform.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://eshkol.ai">
  <meta property="og:image" content="https://eshkol.ai/img/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Eshkol logo — a stylized grape cluster">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Eshkol Programming Language">
  <meta name="twitter:description" content="Compiler-native automatic differentiation. Zero garbage collection. GPU acceleration. Cross-platform.">
  <meta name="twitter:image" content="https://eshkol.ai/img/og-image.png">
  <meta name="theme-color" content="#7c3aed">
  <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="img/favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="img/favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/favicon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="img/favicon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="manifest" href="img/site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <p>Loading Eshkol...</p>
    <p class="loading-sub">This website is written in Eshkol, compiled to WebAssembly.</p>
  </div>
  <script src="eshkol-runtime.js"></script>
  <script src="eshkol-vm.js"></script>
  <script>
    // Restore clean URL after 404.html redirect (GitHub Pages SPA trick)
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        });
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded[0] +
          (decoded[1] ? '&' + decoded[1] : '') + l.hash
        );
      }
    }(window.location));

    (async () => {
      const loadingEl = document.getElementById('loading');
      try {
        const runtime = new EshkolRuntime();
        const response = await fetch('eshkol-site.wasm');
        const { instance } = await WebAssembly.instantiate(
          await response.arrayBuffer(),
          runtime.createImports()
        );
        runtime.setInstance(instance);
        if (loadingEl) loadingEl.remove();
        if (instance.exports.main) {
          instance.exports.main(0, 0);
        }
        // SPA routing: re-call scheme_main on popstate (back/forward)
        window.addEventListener('popstate', () => {
          if (instance.exports.scheme_main) {
            instance.exports.scheme_main(0);
          }
        });
        // Intercept internal link clicks — use pushState instead of full navigation
        document.addEventListener('click', function(e) {
          var target = e.target;
          while (target && target.tagName !== 'A') target = target.parentElement;
          if (!target) return;
          var href = target.getAttribute('href');
          if (!href) return;
          if (href.startsWith('/') && !href.startsWith('//')) {
            e.preventDefault();
            if (window.location.pathname !== href) {
              history.pushState(null, '', href);
            }
            if (instance.exports.scheme_main) {
              instance.exports.scheme_main(0);
            }
            if (href === '/downloads') setTimeout(loadReleases, 100);
          }
        }, false);
        // Initialize the Eshkol bytecode VM for the browser REPL
        // Capture stdout AND stderr from Emscripten so the REPL sees compile/runtime
        // warnings (e.g. "undefined variable 'foo'") instead of swallowing them silently.
        window._vmOutput = '';
        window._vmStderr = '';
        if (typeof EshkolVM !== 'undefined') {
          EshkolVM({
            print: (text) => { window._vmOutput += text + '\n'; },
            printErr: (text) => {
              window._vmStderr += text + '\n';
              console.warn('[VM]', text);
            }
          }).then(vm => {
            runtime._eshkolVM = vm;
            vm.ccall('repl_init', null, [], []);
            console.log('Eshkol VM REPL ready (bytecode interpreter)');
            window._eshkolVM = vm;
          }).catch(e => console.warn('VM load deferred:', e.message));
        }
        // REPL input handler (Enter key evaluates, Up/Down for history)
        const replHistory = [];
        let historyIdx = -1;
        document.addEventListener('keydown', (e) => {
          const input = document.getElementById('repl-input');
          const output = document.getElementById('repl-output');
          if (!input || !output || document.activeElement !== input) return;
          if (e.key === 'Enter') {
            const source = input.value.trim();
            if (!source) return;
            replHistory.unshift(source);
            historyIdx = -1;
            output.textContent += 'eshkol> ' + source + '\n';
            if (window._eshkolVM) {
              try {
                window._vmOutput = '';
                window._vmStderr = '';
                const evalFn = window._eshkolVM.cwrap('repl_eval', 'string', ['string']);
                evalFn(source);
                // If the compiler produced warnings (e.g. "undefined variable"),
                // show them as errors and SUPPRESS the NIL fallback output that
                // followed — the user shouldn't see "()" right after an error.
                if (window._vmStderr) {
                  output.textContent += window._vmStderr.replace(/^WARNING: /gm, 'error: ');
                } else if (window._vmOutput) {
                  output.textContent += window._vmOutput;
                } else {
                  output.textContent += 'error: could not parse expression\n';
                }
              } catch(err) {
                output.textContent += 'error: ' + err.message + '\n';
              }
            } else {
              output.textContent += 'VM loading...\n';
            }
            input.value = '';
            output.scrollTop = output.scrollHeight;
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIdx < replHistory.length - 1) {
              historyIdx++;
              input.value = replHistory[historyIdx];
            }
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIdx > 0) {
              historyIdx--;
              input.value = replHistory[historyIdx];
            } else {
              historyIdx = -1;
              input.value = '';
            }
          }
        });
        // Run button click handler for runnable code examples
        document.addEventListener('click', (e) => {
          const btn = e.target.closest('button[data-run-code]');
          if (btn) {
            e.preventDefault();
            const code = btn.dataset.runCode;
            const wrapper = btn.closest('.runnable-code');
            const output = wrapper ? wrapper.querySelector('[data-run-output]') : null;
            if (!output) return;
            output.style.display = 'block';
            output.textContent = 'Running\u2026';
            if (window._eshkolVM) {
              try {
                window._vmOutput = '';
                window._vmStderr = '';
                const evalFn = window._eshkolVM.cwrap('repl_eval', 'string', ['string']);
                evalFn(code);
                let txt = '';
                if (window._vmStderr) {
                  // suppress NIL fallback after a compile error
                  txt = window._vmStderr.replace(/^WARNING: /gm, 'error: ');
                } else if (window._vmOutput) {
                  txt = window._vmOutput;
                }
                output.textContent = txt || '(no output)';
              } catch(err) {
                output.textContent = 'error: ' + err.message;
              }
            } else {
              output.textContent = 'VM loading \u2014 try again in a moment.';
            }
            return;
          }
        });

        // Mobile hamburger menu — toggle .open on .site-nav-links
        document.addEventListener('click', (e) => {
          const toggle = e.target.closest('.site-nav-toggle');
          if (toggle) {
            e.preventDefault();
            const links = document.querySelector('.site-nav-links');
            if (links) links.classList.toggle('open');
            return;
          }
          // Auto-close menu when a nav link is clicked
          const navLink = e.target.closest('.site-nav-links a');
          if (navLink) {
            const links = document.querySelector('.site-nav-links');
            if (links) links.classList.remove('open');
          }
        });

        // Doc/tutorial sidebar — click handler for documentation links
        // Targets whichever content area exists on the current page
        document.addEventListener('click', (e) => {
          const tab = e.target.closest('[data-url]');
          if (tab) {
            e.preventDefault();
            const url = tab.getAttribute('data-url') || tab.getAttribute('href');
            const area = document.getElementById('doc-content-area')
                      || document.getElementById('tutorial-content-area');
            if (area && url) {
              // Update active state on sidebar items
              document.querySelectorAll('[data-url]').forEach(el => el.classList.remove('active'));
              tab.classList.add('active');
              area.innerHTML = '<p style="color:#71717a;font-style:italic">Loading...</p>';
              fetch(url).then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.text();
              }).then(md => {
                area.innerHTML = runtime.renderMarkdown(md);
                area.scrollTop = 0;
              }).catch(err => {
                area.innerHTML = '<p style="color:#ff4444">Failed to load: ' + err.message + '</p>';
              });
            }
          }
        });

        // GitHub Releases API — populate downloads page
        const loadReleases = () => {
          const container = document.getElementById('releases-container');
          if (!container) return;
          fetch('https://api.github.com/repos/tsotchke/eshkol/releases')
            .then(r => r.json())
            .then(releases => {
              if (!releases.length) { container.innerHTML = '<p style="color:#a1a1aa">No releases found.</p>'; return; }
              let html = '';
              releases.forEach(rel => {
                const badge = rel.prerelease
                  ? '<span style="background:#7c3aed;color:#fff;padding:2px 8px;border-radius:100px;font-size:0.7rem;font-weight:600;margin-left:8px">PRE-RELEASE</span>'
                  : '<span style="background:#16a34a;color:#fff;padding:2px 8px;border-radius:100px;font-size:0.7rem;font-weight:600;margin-left:8px">STABLE</span>';
                html += '<div style="background:#111113;border:1px solid #27272a;border-radius:12px;padding:20px;margin-bottom:16px">';
                html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
                html += '<strong style="color:#fafafa;font-size:1.1rem">' + rel.tag_name + '</strong>' + badge;
                html += '<span style="color:#71717a;font-size:0.85rem;margin-left:auto">' + new Date(rel.published_at).toLocaleDateString() + '</span>';
                html += '</div>';
                if (rel.assets && rel.assets.length) {
                  html += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
                  rel.assets.forEach(a => {
                    html += '<a href="' + a.browser_download_url + '" style="display:inline-block;padding:6px 14px;background:#18181b;border:1px solid #27272a;border-radius:6px;color:#a78bfa;font-size:0.8rem;font-family:JetBrains Mono,monospace;text-decoration:none">' + a.name + '</a>';
                  });
                  html += '</div>';
                }
                html += '</div>';
              });
              container.innerHTML = html;
            })
            .catch(err => { container.innerHTML = '<p style="color:#71717a">Could not load releases. <a href="https://github.com/tsotchke/eshkol/releases">View on GitHub</a></p>'; });
        };
        // Load releases when navigating to downloads page
        window.addEventListener('popstate', () => {
          if (window.location.pathname === '/downloads') setTimeout(loadReleases, 100);
        });
        setTimeout(loadReleases, 500);
      } catch (e) {
        console.error('Eshkol WASM error:', e);
        if (loadingEl) {
          loadingEl.innerHTML =
            '<p style="color:#ff4444">Failed to load: ' + e.message + '</p>' +
            '<p>Try refreshing or visit <a href="https://github.com/tsotchke/eshkol">GitHub</a></p>';
        }
      }
    })();
  </script>
</body>
</html>
